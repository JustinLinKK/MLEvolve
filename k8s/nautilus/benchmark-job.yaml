apiVersion: batch/v1
kind: Job
metadata:
  name: scheduler-benchmark
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scheduler-benchmark
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 60
      initContainers:
        - name: repo-sync
          image: alpine/git:2.47.2
          command:
            - /bin/sh
            - -lc
            - |
              set -eu
              git clone --depth 1 --branch "${GIT_REF}" "${GIT_REPO_URL}" /workspace/repo
          env:
            - name: GIT_REPO_URL
              value: https://github.com/your-org/MLEvolve.git
            - name: GIT_REF
              value: main
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
              ephemeral-storage: "2Gi"
            limits:
              cpu: "500m"
              memory: "512Mi"
              ephemeral-storage: "4Gi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: benchmark
          image: pytorch/pytorch:2.5.1-cuda12.4-cudnn9-runtime
          workingDir: /workspace/repo
          command:
            - /bin/bash
            - -lc
            - |
              set -euo pipefail
              python -m pip install --no-cache-dir -r requirements_base.txt -r requirements_domain.txt -r requirements_ml.txt -r scheduler_benchmark_test/requirements.txt
              bash k8s/nautilus/run_benchmark_job.sh
          env:
            - name: REPO_ROOT
              value: /workspace/repo
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: BENCH_ENABLE_MPS
              value: "false"
            - name: BENCH_GPU_SAMPLER
              value: query
            - name: BENCH_RUN_ROOT
              value: /runtime/bench
            - name: BENCH_RESULTS_ROOT
              value: /results/scheduler_benchmark_test/main
            - name: BENCH_TRACE_KIND
              value: w3
            - name: BENCH_CONFIG_ID
              value: nautilus-stream-off
            - name: BENCH_RUNNER
              value: scheduler
            - name: BENCH_MODE
              value: parallel_default
            - name: BENCH_BACKEND
              value: stream
            - name: BENCH_BATCH_SEARCH
              value: "off"
            - name: CASSAVA_ROOT
              value: /datasets/cassava-leaf-disease-classification/prepared/public
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: runtime
              mountPath: /runtime
            - name: datasets
              mountPath: /datasets
              readOnly: true
            - name: results
              mountPath: /results
          resources:
            requests:
              cpu: "12"
              memory: "48Gi"
              ephemeral-storage: "40Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "14"
              memory: "56Gi"
              ephemeral-storage: "48Gi"
              nvidia.com/gpu: "1"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: workspace
          emptyDir:
            sizeLimit: 8Gi
        - name: runtime
          emptyDir:
            sizeLimit: 48Gi
        - name: datasets
          persistentVolumeClaim:
            claimName: mlevolve-datasets
        - name: results
          persistentVolumeClaim:
            claimName: mlevolve-results
