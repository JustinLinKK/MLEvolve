apiVersion: batch/v1
kind: Job
metadata:
  name: mlevolve-knowledge-ingest
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mlevolve-knowledge-ingest
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 60
      initContainers:
        - name: repo-sync
          image: alpine/git:2.47.2
          command:
            - /bin/sh
            - -lc
            - |
              set -eu
              git clone --depth 1 --branch "${GIT_REF}" "${GIT_REPO_URL}" /workspace/repo
          env:
            - name: GIT_REPO_URL
              value: https://github.com/your-org/MLEvolve.git
            - name: GIT_REF
              value: main
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
              ephemeral-storage: "2Gi"
            limits:
              cpu: "500m"
              memory: "512Mi"
              ephemeral-storage: "4Gi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: ingest
          image: pytorch/pytorch:2.5.1-cuda12.4-cudnn9-runtime
          workingDir: /workspace/repo
          command:
            - /bin/bash
            - -lc
            - |
              set -euo pipefail
              python -m pip install --no-cache-dir -r requirements_base.txt qdrant-client typer pyyaml
              python - <<'PY'
              import urllib.request
              urllib.request.urlopen("http://qdrant:6333/collections", timeout=5).read()
              PY
              python - <<'PY'
              import os
              from pathlib import Path
              import yaml

              source = Path(os.environ.get("MLEVOLVE_CONFIG", "/workspace/repo/config.example.yaml"))
              cfg = yaml.safe_load(source.read_text(encoding="utf-8")) or {}
              scheduler = cfg.setdefault("scheduler", {})
              settings = scheduler.setdefault("settings", {})
              graph_db = settings.setdefault("graph_db", {})
              graph_db["enabled"] = False
              graph_db["mode"] = "off"
              hardware_feature_db = settings.setdefault("hardware_feature_db", {})
              hardware_feature_db["url"] = os.environ.get("QDRANT_URL", "http://qdrant:6333")
              # Keep secrets in Kubernetes Secret env vars rather than writing them
              # into the generated temporary config.
              hardware_feature_db["embedding_api_key"] = ""
              out = Path("/tmp/mlevolve-ingest-config.yaml")
              out.write_text(yaml.safe_dump(cfg, sort_keys=False), encoding="utf-8")
              PY
              python -m localml_scheduler.cli knowledge ingest-schema \
                --config /tmp/mlevolve-ingest-config.yaml \
                --schema-root schema \
                --recreate
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: MLEVOLVE_CONFIG
              value: /workspace/repo/config.example.yaml
            - name: QDRANT_URL
              value: http://qdrant:6333
          envFrom:
            - secretRef:
                name: scheduler-db-env
                optional: true
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
              ephemeral-storage: "12Gi"
            limits:
              cpu: "4"
              memory: "12Gi"
              ephemeral-storage: "20Gi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: workspace
          emptyDir:
            sizeLimit: 8Gi
