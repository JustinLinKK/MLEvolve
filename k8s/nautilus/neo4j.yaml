apiVersion: v1
kind: Secret
metadata:
  name: neo4j-auth
type: Opaque
stringData:
  NEO4J_AUTH: neo4j/change-me
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
spec:
  selector:
    app.kubernetes.io/name: neo4j
  ports:
    - name: bolt
      port: 7687
      targetPort: 7687
    - name: http
      port: 7474
      targetPort: 7474
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: neo4j
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neo4j
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: neo4j
          image: neo4j:5.26
          ports:
            - containerPort: 7687
              name: bolt
            - containerPort: 7474
              name: http
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: neo4j-auth
                  key: NEO4J_AUTH
            - name: NEO4J_server_default__listen__address
              value: 0.0.0.0
            - name: NEO4J_server_memory_heap_initial__size
              value: 2G
            - name: NEO4J_server_memory_heap_max__size
              value: 2G
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "500m"
              memory: "4Gi"
              ephemeral-storage: "4Gi"
            limits:
              cpu: "2"
              memory: "6Gi"
              ephemeral-storage: "8Gi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
