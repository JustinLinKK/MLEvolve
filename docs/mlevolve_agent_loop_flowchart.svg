<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="2220" viewBox="0 0 1680 2220" role="img" aria-labelledby="title desc">
  <title id="title">MLEvolve Agent Loop Flowchart</title>
  <desc id="desc">End-to-end MLEvolve agent loop with hardware-aware three-stage draft generation, scheduler execution, result parsing, evaluation, and feedback.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .title { font: 700 42px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #526071; }
      .lane-title { font: 700 18px Arial, sans-serif; fill: #233247; }
      .box-title { font: 700 17px Arial, sans-serif; fill: #182336; }
      .box-text { font: 400 14px Arial, sans-serif; fill: #2f3d4f; }
      .small { font: 400 13px Arial, sans-serif; fill: #425066; }
      .tiny { font: 400 12px Arial, sans-serif; fill: #526071; }
      .node { fill: #ffffff; stroke: #9db0c8; stroke-width: 2; rx: 10; ry: 10; }
      .controller { fill: #eef6ff; stroke: #4f8edb; }
      .agent { fill: #f3f0ff; stroke: #826ad6; }
      .hardware { fill: #edf8f2; stroke: #45a978; }
      .execution { fill: #fff7e8; stroke: #d89a32; }
      .feedback { fill: #fff0f2; stroke: #d65c6d; }
      .decision { fill: #ffffff; stroke: #8b9bb0; stroke-width: 2; }
      .callout { fill: #fffef6; stroke: #d4b24d; stroke-width: 2; rx: 10; ry: 10; }
      .lane { fill: #ffffff; stroke: #d6dee9; stroke-width: 1.5; rx: 18; ry: 18; }
      .arrow { fill: none; stroke: #526071; stroke-width: 2.4; marker-end: url(#arrowhead); }
      .loop { fill: none; stroke: #d65c6d; stroke-width: 2.6; marker-end: url(#arrowhead-red); stroke-dasharray: 7 6; }
      .soft { fill: none; stroke: #8b9bb0; stroke-width: 2; marker-end: url(#arrowhead-soft); stroke-dasharray: 5 5; }
      .stage-arrow { fill: none; stroke: #45a978; stroke-width: 2.5; marker-end: url(#arrowhead-green); }
      .label { font: 700 12px Arial, sans-serif; fill: #526071; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <path d="M0,0 L12,4.5 L0,9 Z" fill="#526071"/>
    </marker>
    <marker id="arrowhead-soft" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <path d="M0,0 L12,4.5 L0,9 Z" fill="#8b9bb0"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <path d="M0,0 L12,4.5 L0,9 Z" fill="#45a978"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <path d="M0,0 L12,4.5 L0,9 Z" fill="#d65c6d"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1680" height="2220"/>
  <text class="title" x="70" y="68">MLEvolve Agent Loop Flowchart</text>
  <text class="subtitle" x="70" y="102">End-to-end search loop with hardware-aware model design -> datatype precision -> training hyperparameter optimization.</text>

  <rect class="lane" x="50" y="135" width="330" height="1960"/>
  <text class="lane-title" x="75" y="168">1. Bootstrap Runtime</text>

  <rect class="lane" x="410" y="135" width="410" height="1960"/>
  <text class="lane-title" x="435" y="168">2. Search Controller</text>

  <rect class="lane" x="850" y="135" width="380" height="1960"/>
  <text class="lane-title" x="875" y="168">3. Generation Agents</text>

  <rect class="lane" x="1260" y="135" width="370" height="1960"/>
  <text class="lane-title" x="1285" y="168">4. Execution, Evidence, Feedback</text>

  <!-- Bootstrap lane -->
  <rect class="node controller" x="80" y="210" width="270" height="108"/>
  <text class="box-title" x="105" y="240">run.py starts experiment</text>
  <text class="box-text" x="105" y="266">load config, seed, logging</text>
  <text class="box-text" x="105" y="287">hardware monitor, task desc</text>
  <text class="box-text" x="105" y="308">prepare workspace</text>

  <polygon class="decision" points="215,365 340,430 215,495 90,430"/>
  <text class="box-title" text-anchor="middle" x="215" y="416">scheduler</text>
  <text class="box-title" text-anchor="middle" x="215" y="438">enabled?</text>
  <text class="tiny" text-anchor="middle" x="215" y="459">config.scheduler.enabled</text>

  <rect class="node hardware" x="80" y="545" width="270" height="124"/>
  <text class="box-title" x="105" y="575">Attach scheduler client</text>
  <text class="box-text" x="105" y="601">prewarm hardware graph</text>
  <text class="box-text" x="105" y="622">start or connect service</text>
  <text class="box-text" x="105" y="643">attach to agent + executor</text>

  <rect class="node controller" x="80" y="725" width="270" height="124"/>
  <text class="box-title" x="105" y="755">Initialize AgentSearch</text>
  <text class="box-text" x="105" y="781">Journal + virtual root</text>
  <text class="box-text" x="105" y="802">metric direction</text>
  <text class="box-text" x="105" y="823">branch state + memory</text>

  <!-- Search controller lane -->
  <rect class="node controller" x="455" y="210" width="320" height="110"/>
  <text class="box-title" x="480" y="240">Phase 1: initial drafts</text>
  <text class="box-text" x="480" y="266">generate diverse root drafts</text>
  <text class="box-text" x="480" y="287">execute_immediately = false</text>
  <text class="box-text" x="480" y="308">nodes become pending execution</text>

  <rect class="node controller" x="455" y="390" width="320" height="126"/>
  <text class="box-title" x="480" y="420">agent.step()</text>
  <text class="box-text" x="480" y="446">refresh data preview if needed</text>
  <text class="box-text" x="480" y="467">select node or use root</text>
  <text class="box-text" x="480" y="488">dispatch one expansion action</text>

  <rect class="node controller" x="455" y="585" width="320" height="132"/>
  <text class="box-title" x="480" y="615">node_selection.py</text>
  <text class="box-text" x="480" y="641">soft exploration/exploitation</text>
  <text class="box-text" x="480" y="662">UCT, top-K sampling, decay</text>
  <text class="box-text" x="480" y="683">respect child limits + locks</text>

  <polygon class="decision" points="615,775 785,860 615,945 445,860"/>
  <text class="box-title" text-anchor="middle" x="615" y="835">parent state</text>
  <text class="small" text-anchor="middle" x="615" y="858">root, buggy, valid,</text>
  <text class="small" text-anchor="middle" x="615" y="879">stagnant, saturated</text>

  <rect class="node controller" x="455" y="1025" width="320" height="126"/>
  <text class="box-title" x="480" y="1055">Generate or repair node</text>
  <text class="box-text" x="480" y="1081">draft / debug / improve</text>
  <text class="box-text" x="480" y="1102">evolution / fusion / aggregation</text>
  <text class="box-text" x="480" y="1123">register SearchNode metadata</text>

  <rect class="node controller" x="455" y="1230" width="320" height="128"/>
  <text class="box-title" x="480" y="1260">Code review guardrail</text>
  <text class="box-text" x="480" y="1286">metric and leakage checks</text>
  <text class="box-text" x="480" y="1307">hardware-critical risks</text>
  <text class="box-text" x="480" y="1328">optional SEARCH/REPLACE patch</text>

  <rect class="node controller" x="455" y="1438" width="320" height="124"/>
  <text class="box-title" x="480" y="1468">Defer or execute</text>
  <text class="box-text" x="480" y="1494">scheduler mode: collect batch</text>
  <text class="box-text" x="480" y="1515">local mode: run immediately</text>
  <text class="box-text" x="480" y="1536">record pipeline node action</text>

  <!-- Generation agents lane -->
  <rect class="node agent" x="890" y="210" width="300" height="110"/>
  <text class="box-title" x="915" y="240">Draft agent</text>
  <text class="box-text" x="915" y="266">task, data preview, memory</text>
  <text class="box-text" x="915" y="287">cold-start guidance</text>
  <text class="box-text" x="915" y="308">hardware sections if enabled</text>

  <rect class="node hardware" x="890" y="375" width="300" height="112"/>
  <text class="box-title" x="915" y="405">Hardware context lookup</text>
  <text class="box-text" x="915" y="431">build candidate from code/stage</text>
  <text class="box-text" x="915" y="452">graph evidence + code recipes</text>
  <text class="box-text" x="915" y="473">stage-focused prompt sections</text>

  <rect class="node agent" x="890" y="560" width="300" height="96"/>
  <text class="box-title" x="915" y="590">data_processing</text>
  <text class="box-text" x="915" y="616">load input, features, splits</text>
  <text class="box-text" x="915" y="637">no model or training loop</text>

  <rect class="node hardware" x="890" y="715" width="300" height="120"/>
  <text class="box-title" x="915" y="745">Stage 1: model_design</text>
  <text class="box-text" x="915" y="771">architecture, model family</text>
  <text class="box-text" x="915" y="792">loss, output interface</text>
  <text class="box-text" x="915" y="813">no dtype or hyperparameters</text>

  <rect class="node hardware" x="890" y="895" width="300" height="138"/>
  <text class="box-title" x="915" y="925">Stage 2: datatype_precision</text>
  <text class="box-text" x="915" y="951">DEVICE, USE_AMP, AMP_DTYPE</text>
  <text class="box-text" x="915" y="972">bf16/fp16/fp32/TF32 policy</text>
  <text class="box-text" x="915" y="993">GradScaler + fallback</text>
  <text class="box-text" x="915" y="1014">precision logging utility</text>

  <rect class="node hardware" x="890" y="1092" width="300" height="144"/>
  <text class="box-title" x="915" y="1122">Stage 3: training_evaluation</text>
  <text class="box-text" x="915" y="1148">optimizer, LR, weight decay</text>
  <text class="box-text" x="915" y="1169">batch, accumulation, epochs</text>
  <text class="box-text" x="915" y="1190">workers, checkpoints, metric</text>
  <text class="box-text" x="915" y="1211">validation + submission.csv</text>

  <rect class="node agent" x="890" y="1305" width="300" height="118"/>
  <text class="box-title" x="915" y="1335">Meta merge</text>
  <text class="box-text" x="915" y="1361">merge step snippets faithfully</text>
  <text class="box-text" x="915" y="1382">preserve stage boundaries</text>
  <text class="box-text" x="915" y="1403">produce runnable script</text>

  <rect class="node agent" x="890" y="1495" width="300" height="136"/>
  <text class="box-title" x="915" y="1525">Other stage agents</text>
  <text class="box-text" x="915" y="1551">debug: fix buggy nodes</text>
  <text class="box-text" x="915" y="1572">improve: focused change</text>
  <text class="box-text" x="915" y="1593">evolution: branch trajectory</text>
  <text class="box-text" x="915" y="1614">fusion/aggregation: combine ideas</text>

  <!-- Execution and feedback lane -->
  <rect class="node hardware" x="1300" y="210" width="290" height="124"/>
  <text class="box-title" x="1325" y="240">Pre-submit review</text>
  <text class="box-text" x="1325" y="266">plan_job_packet evidence</text>
  <text class="box-text" x="1325" y="287">safe literal rewrites</text>
  <text class="box-text" x="1325" y="308">batch size yes, no epoch increase</text>

  <polygon class="decision" points="1445,390 1585,465 1445,540 1305,465"/>
  <text class="box-title" text-anchor="middle" x="1445" y="451">execution</text>
  <text class="box-title" text-anchor="middle" x="1445" y="473">backend?</text>
  <text class="tiny" text-anchor="middle" x="1445" y="493">scheduler or local</text>

  <rect class="node execution" x="1300" y="605" width="290" height="136"/>
  <text class="box-title" x="1325" y="635">Scheduler path</text>
  <text class="box-text" x="1325" y="661">submit_many round</text>
  <text class="box-text" x="1325" y="682">batch/runtime probes</text>
  <text class="box-text" x="1325" y="703">placement + packing</text>
  <text class="box-text" x="1325" y="724">worker executes script</text>

  <rect class="node execution" x="1300" y="800" width="290" height="120"/>
  <text class="box-title" x="1325" y="830">Local subprocess path</text>
  <text class="box-text" x="1325" y="856">isolate paths</text>
  <text class="box-text" x="1325" y="877">write runfile_N.py</text>
  <text class="box-text" x="1325" y="898">capture stdout/stderr</text>

  <rect class="node feedback" x="1300" y="985" width="290" height="130"/>
  <text class="box-title" x="1325" y="1015">Parse result</text>
  <text class="box-text" x="1325" y="1041">term_out -> metric, analysis</text>
  <text class="box-text" x="1325" y="1062">is_buggy, is_valid</text>
  <text class="box-text" x="1325" y="1083">exception details if failed</text>

  <rect class="node feedback" x="1300" y="1180" width="290" height="132"/>
  <text class="box-title" x="1325" y="1210">Validate executed node</text>
  <text class="box-text" x="1325" y="1236">submission exists</text>
  <text class="box-text" x="1325" y="1257">zero metric anomaly check</text>
  <text class="box-text" x="1325" y="1278">register successful branch node</text>

  <rect class="node feedback" x="1300" y="1380" width="290" height="146"/>
  <text class="box-title" x="1325" y="1410">Evaluate and persist</text>
  <text class="box-text" x="1325" y="1436">check improvement</text>
  <text class="box-text" x="1325" y="1457">append to Journal</text>
  <text class="box-text" x="1325" y="1478">update best solution</text>
  <text class="box-text" x="1325" y="1499">backpropagate reward</text>

  <rect class="node feedback" x="1300" y="1595" width="290" height="144"/>
  <text class="box-title" x="1325" y="1625">Evidence and logs</text>
  <text class="box-text" x="1325" y="1651">pipeline.sqlite3 events</text>
  <text class="box-text" x="1325" y="1672">hardware_decision pipeline</text>
  <text class="box-text" x="1325" y="1693">scheduler graph evidence</text>
  <text class="box-text" x="1325" y="1714">runtime, VRAM, throughput</text>

  <polygon class="decision" points="1445,1810 1585,1885 1445,1960 1305,1885"/>
  <text class="box-title" text-anchor="middle" x="1445" y="1871">budget</text>
  <text class="box-title" text-anchor="middle" x="1445" y="1893">remaining?</text>
  <text class="tiny" text-anchor="middle" x="1445" y="1913">steps/time/work</text>

  <rect class="node feedback" x="455" y="1710" width="320" height="128"/>
  <text class="box-title" x="480" y="1740">Loop state updates</text>
  <text class="box-text" x="480" y="1766">best_node, top candidates</text>
  <text class="box-text" x="480" y="1787">branch success/stagnation</text>
  <text class="box-text" x="480" y="1808">save run + journal tree</text>

  <rect class="node controller" x="80" y="1910" width="270" height="118"/>
  <text class="box-title" x="105" y="1940">Finish run</text>
  <text class="box-text" x="105" y="1966">write best_solution.py</text>
  <text class="box-text" x="105" y="1987">comparison metrics</text>
  <text class="box-text" x="105" y="2008">hardware report + cleanup</text>

  <!-- Next-stage optimization callouts -->
  <rect class="callout" x="850" y="1745" width="380" height="235"/>
  <text class="box-title" x="875" y="1776">Next optimization hook points</text>
  <text class="box-text" x="875" y="1805">A. model_design: rank/model-size search</text>
  <text class="box-text" x="875" y="1828">B. datatype_precision: dtype ablation policy</text>
  <text class="box-text" x="875" y="1851">C. training_evaluation: LR/batch/accum sweep</text>
  <text class="box-text" x="875" y="1874">D. pre-submit review: safer AST rewrites</text>
  <text class="box-text" x="875" y="1897">E. scheduler evidence: learn from failed probes</text>
  <text class="box-text" x="875" y="1920">F. node selection: resource-aware reward</text>
  <text class="box-text" x="875" y="1943">G. code review: enforce stage boundaries</text>

  <rect class="callout" x="80" y="1060" width="270" height="210"/>
  <text class="box-title" x="105" y="1090">Mode behavior</text>
  <text class="box-text" x="105" y="1118">origin: scheduler off,</text>
  <text class="box-text" x="105" y="1139">hardware context off</text>
  <text class="box-text" x="105" y="1170">baseline: scheduler may run,</text>
  <text class="box-text" x="105" y="1191">hardware context off</text>
  <text class="box-text" x="105" y="1222">hardware_aware: context on</text>
  <text class="box-text" x="105" y="1243">when scheduler is attached</text>

  <!-- Main arrows -->
  <path class="arrow" d="M215 318 L215 365"/>
  <path class="arrow" d="M215 495 L215 545"/>
  <text class="label" x="235" y="525">yes</text>
  <path class="soft" d="M90 430 C40 430 40 787 80 787"/>
  <text class="label" x="52" y="610">no</text>
  <path class="arrow" d="M215 669 L215 725"/>
  <path class="arrow" d="M350 787 C390 787 390 265 455 265"/>
  <path class="arrow" d="M615 320 L615 390"/>
  <path class="arrow" d="M615 516 L615 585"/>
  <path class="arrow" d="M615 717 L615 775"/>
  <path class="arrow" d="M615 945 L615 1025"/>
  <path class="arrow" d="M615 1151 L615 1230"/>
  <path class="arrow" d="M615 1358 L615 1438"/>

  <!-- Dispatch arrows to agents -->
  <path class="arrow" d="M775 1088 C820 1088 820 265 890 265"/>
  <text class="label" x="802" y="250">root draft</text>
  <path class="soft" d="M775 1095 C830 1095 830 1563 890 1563"/>
  <text class="label" x="802" y="1544">debug/improve/fusion</text>

  <!-- Draft stepwise stage arrows -->
  <path class="stage-arrow" d="M1040 320 L1040 375"/>
  <path class="stage-arrow" d="M1040 487 L1040 560"/>
  <path class="stage-arrow" d="M1040 656 L1040 715"/>
  <path class="stage-arrow" d="M1040 835 L1040 895"/>
  <path class="stage-arrow" d="M1040 1033 L1040 1092"/>
  <path class="stage-arrow" d="M1040 1236 L1040 1305"/>
  <path class="arrow" d="M890 1364 C820 1364 820 1088 775 1088"/>

  <!-- Execution arrows -->
  <path class="arrow" d="M775 1500 C900 1500 900 272 1300 272"/>
  <path class="arrow" d="M1445 334 L1445 390"/>
  <path class="arrow" d="M1445 540 L1445 605"/>
  <text class="label" x="1466" y="574">scheduler</text>
  <path class="soft" d="M1305 465 C1245 465 1245 860 1300 860"/>
  <text class="label" x="1232" y="670">local</text>
  <path class="arrow" d="M1445 741 L1445 985"/>
  <path class="arrow" d="M1445 920 L1445 985"/>
  <path class="arrow" d="M1445 1115 L1445 1180"/>
  <path class="arrow" d="M1445 1312 L1445 1380"/>
  <path class="arrow" d="M1445 1526 L1445 1595"/>
  <path class="arrow" d="M1445 1739 L1445 1810"/>

  <!-- Feedback loop -->
  <path class="loop" d="M1305 1885 C1080 1885 985 1774 775 1774"/>
  <text class="label" x="1030" y="1848">yes: select next node</text>
  <path class="loop" d="M455 1774 C395 1774 395 650 455 650"/>
  <path class="arrow" d="M1305 1885 C1110 2075 430 2075 350 1969"/>
  <text class="label" x="1110" y="2050">no: finish</text>

  <!-- Subtle evidence arrows -->
  <path class="soft" d="M1445 1595 C1445 1480 1230 1480 1190 1164"/>
  <text class="label" x="1235" y="1460">future context</text>
  <path class="soft" d="M1300 1667 C1235 1667 1235 431 1190 431"/>
  <text class="label" x="1230" y="1005">graph/vector evidence</text>

  <rect class="node" x="80" y="2118" width="1510" height="54"/>
  <text class="small" x="105" y="2151">Reading guide: solid arrows are the normal control path, green arrows are the three-stage hardware-aware draft pipeline, dashed red arrows are feedback loops, and gray dashed arrows are evidence/context reuse.</text>
</svg>
