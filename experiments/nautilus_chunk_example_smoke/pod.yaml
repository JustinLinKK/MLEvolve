apiVersion: v1
kind: Pod
metadata:
  name: chunk-example-smoke
  namespace: ecepxie
  labels:
    app: chunk-example-smoke
spec:
  restartPolicy: Never
  activeDeadlineSeconds: 1800
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: nvidia.com/gpu.product
            operator: In
            values:
            - NVIDIA-L40S
            - NVIDIA-L40
            - NVIDIA-GeForce-RTX-4090
            - NVIDIA-RTX-4000-Ada-Generation
            - NVIDIA-RTX-5000-Ada-Generation
            - NVIDIA-A40
            - NVIDIA-RTX-A6000
            - NVIDIA-RTX-A5000
            - NVIDIA-RTX-A4000
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: nvidia.com/gpu.product
            operator: In
            values:
            - NVIDIA-L40S
            - NVIDIA-L40
            - NVIDIA-GeForce-RTX-4090
  containers:
  - name: smoke
    image: nvcr.io/nvidia/pytorch:24.10-py3
    command: ["python", "/scripts/run_chunk_examples.py"]
    resources:
      limits:
        nvidia.com/gpu: 1
        memory: 32Gi
        cpu: "4"
        ephemeral-storage: 50Gi
      requests:
        nvidia.com/gpu: 1
        memory: 16Gi
        cpu: "2"
        ephemeral-storage: 30Gi
    volumeMounts:
    - name: scripts
      mountPath: /scripts
      readOnly: true
  volumes:
  - name: scripts
    configMap:
      name: chunk-example-runner
