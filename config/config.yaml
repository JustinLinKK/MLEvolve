# ============================================================
#  Data & paths
# ============================================================
data_dir: null
dataset_dir: ""  # path to mle-bench dataset root, e.g. /data/mle-bench
desc_file: null
goal: null
eval: null
exp_name: null
exp_id: ""

log_dir: ./runs
log_level: INFO
workspace_dir: ./runs
preprocess_data: True
copy_data: False

# Resource
start_cpu_id: 0
cpu_number: 21

# Hardware monitor
monitor:
  enabled: true
  interval_seconds: 5
  gpu_idle_util_threshold: 10
  gpu_idle_memory_threshold_mb: 1024
  cpu_idle_util_threshold: 20

# Model paths
torch_hub_dir: ""       # path to torch hub cache, e.g. /data/pretrain_models/torch_models
pretrain_model_dir: ""  # path to pretrained model weights, e.g. /data/pretrain_models

# ============================================================
#  Code execution
# ============================================================
exec:
  timeout: 32400
  agent_file_name: runfile.py

# ============================================================
#  Local scheduler bridge
# ============================================================
scheduler:
  enabled: true
  settings_path: null       # optional path to localml_scheduler/configs/scheduler.example.yaml
  runtime_root: null        # null = use <workspace>/scheduler_runtime for this run
  start_service: true
  wait_poll_interval_seconds: 1
  wait_timeout_seconds: null
  requires_gpu: true
  estimated_vram_mb: null
  estimated_ram_mb: null
  packing_eligible: false   # keep raw MLEvolve scripts exclusive unless explicitly profiled
  packing_family: mlevolve_script
  packing_max_slowdown_ratio: null

# ============================================================
#  Agent config
# ============================================================
agent:

  # --- Basic run params ---
  steps: 500
  time_limit: 43200          # 12h
  initial_drafts: 3
  seed: 42
  data_preview: True

  # --- LLM models ---
  code:
    model: openai/gpt-oss-120b:free
    temp: 1
    provider: "openrouter"   # Optional: gemini, openai, or openrouter. Empty keeps model-name routing.
    base_url: "https://openrouter.ai/api/v1"   # Gemini/OpenAI-compatible endpoint. OpenRouter: https://openrouter.ai/api/v1
    api_key: "enter-your-api-key"    # Provider API key
  feedback:
    model: openai/gpt-oss-120b:free
    temp: 1
    provider: "openrouter"   # Optional: gemini, openai, or openrouter. Empty keeps model-name routing.
    base_url: "https://openrouter.ai/api/v1"   # Gemini/OpenAI-compatible endpoint. OpenRouter: https://openrouter.ai/api/v1
    api_key: "enter-your-api-key"    # Provider API key

  # --- Submission check ---
  check_data_leakage: True

  # --- Code gen mode ---
  use_diff_mode: True                # SEARCH/REPLACE patch

  # --- Branch strategy ---
  fusion_vs_evolution_prob: 0.3
  branch_fusion_trigger_prob: 1.0
  max_fusion_drafts: 2

  # --- Global memory ---
  use_global_memory: True
  memory_similarity_threshold: 0.7
  memory_embedding_device: cuda
  memory_embedding_model_path: "BAAI/bge-base-en-v1.5"  # HuggingFace model name or local path

  # --------------------------------------------------------
  #  Search tree params
  # --------------------------------------------------------
  search:
    # Parallel & resources
    parallel_search_num: 2
    num_gpus: 1

    # Node expansion limits
    num_drafts: 5
    num_bugs: 1
    num_improves: 3
    topk_max_improves: 10

    # Debug depth
    max_debug_depth: 20
    back_debug_depth: 3
    debug_prob: 1

    # Improvement criteria
    metric_improvement_threshold: 0.0001
    max_improve_failure: 3

    # Stagnation detection
    branch_stagnation_threshold: 3
    topk_stagnation_threshold: 6
    stagnation_window: 4
    top_candidates_size: 20

    # Explore-exploit soft switch
    explore_switch_start: 0.5
    explore_switch_end: 0.7
    min_exploration_weight: 0.2

    # Top-K node selection
    topk_early_k: 5
    topk_early_max_per_branch: 3
    topk_late_k: 3
    topk_late_max_per_branch: 2

    # Force backprop
    force_backprop_late_threshold: 0.80
    force_backprop_late_prob: 0.5
    force_backprop_mid_threshold: 0.4
    force_backprop_mid_modulo: 3
    recent_best_window: 4

    # Multi-branch fusion conditions
    fusion_min_time_hours: 6
    fusion_max_time_hours: 10
    fusion_min_successful_nodes: 2
    fusion_min_branches: 2

  # --------------------------------------------------------
  #  Exploration constant decay
  # --------------------------------------------------------
  decay:
    exploration_constant: 1.414
    lower_bound: 0.5
    alpha: 0.01
    phase_ratios: [0.3, 0.7]

# ============================================================
#  Cold-start knowledge
# ============================================================
coldstart:
  use_coldstart: True
  task_json_path: "engine/coldstart/competition_tag_classified.json"
  model_json_path: "engine/coldstart/models_guidance_classified.json"
  description: ""
