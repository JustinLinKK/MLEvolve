  - schema_version: hardware_feature_record_v1
    record_id: generic.cuda.oom.fallback_policy
    title: CUDA OOM fallback and effective batch preservation
    summary_text: Hardware-aware generated training code should degrade gracefully after CUDA OOM by reducing physical batch size and using gradient accumulation to preserve effective batch size when possible.
    detail_text: Make the physical batch size adjustable and compute accumulation steps from the target effective batch size. On OOM, clear CUDA cache, lower the physical batch size, increase accumulation if valid for the optimizer schedule, and report the resolved values. This gives the scheduler graph reusable evidence instead of only a failed node.
    vendor: generic
    architectures: [generic_cuda]
    accelerator_names: []
    compute_capabilities: []
    toolkits: [cuda]
    frameworks: [pytorch]
    workload_types: [vision_training, transformer_training, generative_ai]
    features: [oom_recovery, gradient_accumulation, batch_size, vram]
    recommended_patterns:
      - Separate physical batch size from effective batch size.
      - Retry with a lower batch size after CUDA OOM only when the task and training loop can safely resume.
      - Log OOM fallback decisions in machine-readable output.
    avoid_patterns:
      - Do not silently continue after OOM without reporting changed batch semantics.
      - Do not increase accumulation without adjusting optimizer-step and scheduler-step logic.
    source_refs:
      - title: PyTorch CUDA memory management
        url: https://pytorch.org/docs/stable/notes/cuda.html#memory-management
        source_type: framework_documentation
        retrieved_or_verified_date: "2026-05-15"
    confidence: 0.78
    last_verified: "2026-05-15"
    tags: [oom, batch_size, gradient_accumulation, vram]

  - schema_version: hardware_feature_record_v1
    record_id: generic.pytorch.checkpointing.long_runs
    title: Scheduler-friendly checkpointing for long training runs
    summary_text: Long-running scheduler jobs should save resumable checkpoints that include model, optimizer, scheduler, scaler, epoch, step, and metric state.
    detail_text: Generated code should checkpoint at safe points and include all state needed to resume without changing validation behavior. This is especially important when scheduler preemption, pause/resume, runtime probing, or packed execution can interrupt training. Keep checkpoint paths configurable and node-specific so parallel MLEvolve runs do not collide.
    vendor: generic
    architectures: [generic]
    accelerator_names: []
    compute_capabilities: []
    toolkits: [cuda, cpu]
    frameworks: [pytorch]
    workload_types: [vision_training, transformer_training, tabular_training]
    features: [checkpointing, resume, scheduler_safe_points]
    recommended_patterns:
      - Save model, optimizer, scheduler, scaler, epoch, step, and best metric in checkpoints.
      - Use node-specific checkpoint paths supplied by the executor or scheduler.
      - Call scheduler safe points between epochs or controlled step windows.
    avoid_patterns:
      - Do not overwrite global best_model.pth paths across parallel nodes.
      - Do not save model weights without optimizer and progress state for resumable jobs.
    source_refs:
      - title: PyTorch saving and loading models
        url: https://pytorch.org/tutorials/beginner/saving_loading_models.html
        source_type: framework_documentation
        retrieved_or_verified_date: "2026-05-15"
    confidence: 0.84
    last_verified: "2026-05-15"
    tags: [checkpointing, resume, long_runs, scheduler]
