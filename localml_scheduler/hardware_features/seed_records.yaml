records:
  - schema_version: hardware_feature_record_v1
    record_id: nvidia.blackwell.rtx5090.capability.overview
    title: RTX 5090 Blackwell training capability overview
    summary_text: RTX 5090-class Blackwell GPUs provide high local VRAM and fifth-generation Tensor Cores, making them strong candidates for mixed-precision vision and transformer training when code keeps batch size, precision, and accumulation configurable.
    detail_text: Use RTX 5090-style Blackwell hardware as a high-throughput single-GPU target. Prefer code that centralizes batch size, precision, image or sequence length, and gradient accumulation so the scheduler can adapt to real VRAM and runtime observations. Treat architecture-specific FP4 guidance mainly as inference-oriented unless the selected framework and training stack explicitly support it for the workload.
    vendor: nvidia
    architectures: [blackwell]
    accelerator_names: [rtx_5090, geforce_rtx_5090]
    compute_capabilities: ["12.0"]
    toolkits: [cuda]
    frameworks: [pytorch]
    workload_types: [vision_training, transformer_training, generative_ai]
    features: [tensor_cores, blackwell, gddr7, mixed_precision]
    recommended_patterns:
      - Keep batch size, precision, gradient accumulation, and input resolution in a top-level training config.
      - Prefer scheduler-provided batch and epoch settings over hard-coded constants.
      - Log peak VRAM, throughput, selected precision, and resolved batch size for graph feedback.
    avoid_patterns:
      - Do not assume FP4 is a drop-in training precision for generic PyTorch training loops.
      - Do not hide memory-critical knobs inside nested model code.
    source_refs:
      - title: NVIDIA GeForce RTX 5090 product page
        url: https://www.nvidia.com/en-us/geforce/graphics-cards/50-series/rtx-5090/
        source_type: vendor_product_page
