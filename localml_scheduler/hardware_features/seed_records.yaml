  - schema_version: hardware_feature_record_v1
    record_id: generic.cuda.dataloader.h2d_throughput
    title: CUDA dataloader and host-to-device throughput guidance
    summary_text: GPU-rich training runs often underperform when CPU input pipelines and host-to-device copies are not tuned, so generated code should use pinned memory, non-blocking transfers, and stable worker settings.
    detail_text: For PyTorch CUDA workloads, enable pin_memory on DataLoader when tensors are copied to GPU, pass non_blocking=True on tensor.to(device), and tune num_workers and persistent_workers based on dataset size. The scheduler can then distinguish model bottlenecks from input pipeline bottlenecks using runtime and telemetry profiles.
    vendor: generic
    architectures: [generic_cuda]
    accelerator_names: []
    compute_capabilities: []
    toolkits: [cuda]
    frameworks: [pytorch]
    workload_types: [vision_training, tabular_training, transformer_training]
    features: [dataloader, pinned_memory, non_blocking_transfer, throughput]
    recommended_patterns:
      - Set pin_memory=True when DataLoader batches are moved to CUDA.
      - Use tensor.to(device, non_blocking=True) for batch tensors when pinned memory is enabled.
      - Use persistent_workers=True when num_workers is greater than zero and the dataset is stable.
    avoid_patterns:
      - Do not set excessive num_workers without measuring loader overhead.
      - Do not perform repeated CPU-to-GPU conversion inside inner model layers.
    source_refs:
      - title: PyTorch DataLoader documentation
        url: https://pytorch.org/docs/stable/data.html
        source_type: framework_documentation
        retrieved_or_verified_date: "2026-05-15"
