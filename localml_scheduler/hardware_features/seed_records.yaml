  - schema_version: hardware_feature_record_v1
    record_id: nvidia.blackwell.tensor_cores.precision_policy
    title: Blackwell Tensor Core precision policy
    summary_text: Blackwell Tensor Cores can accelerate low-precision AI math, but generated training code should use framework-supported AMP, bf16, or fp16 paths first and guard experimental precision choices.
    detail_text: For MLEvolve training code, prefer torch.amp autocast with bf16 or fp16 when the toolkit, model, and loss path are compatible. Keep GradScaler optional because bf16 generally does not require scaling, while fp16 often benefits from it. Treat FP4 and TensorRT-oriented low-precision paths as specialized acceleration features that require explicit framework support and validation.
    vendor: nvidia
    architectures: [blackwell]
    accelerator_names: [rtx_5090, geforce_rtx_5090]
    compute_capabilities: ["12.0"]
    toolkits: [cuda]
    frameworks: [pytorch]
    workload_types: [vision_training, transformer_training, inference]
    features: [tensor_cores, amp, bf16, fp16, fp4]
    recommended_patterns:
      - Use torch.amp.autocast with an explicit dtype selected from hardware and framework context.
      - Use GradScaler for fp16 training and make it optional for bf16 training.
      - Keep a full-precision fallback path for numerically fragile losses or metrics.
    avoid_patterns:
      - Do not blindly enable every low-precision mode at once.
      - Do not use inference-only FP4 paths in training code unless the stack explicitly supports that workflow.
    source_refs:
      - title: NVIDIA TensorRT FP4 on Blackwell GeForce RTX 50 Series
