job_id: "replace-with-uuid-if-desired"
agent_id: "agent-1"
workflow_id: "workflow-1"
baseline_model_id: "toy-baseline-a"
baseline_model_path: "./localml_scheduler/runtime/baselines/baseline_a.pt"
task_type: "toy_classification"
priority: 5
max_steps: 40
max_epochs: 4
metadata:
  note: "example job spec"
resource_requirements:
  requires_gpu: true
  estimated_vram_mb: 2048
  estimated_ram_mb: 4096
  gpu_slots: 1
checkpoint_policy:
  save_every_n_steps: 2
  save_every_epoch: true
  keep_last_n: 3
  pause_mode: "step"
config:
  runner_target: "localml_scheduler.examples.toy_pytorch_runner:run_toy_training_job"
  runner_kwargs:
    learning_rate: 0.02
    batch_size: 16
    epochs: 4
    sleep_per_step: 0.02
  loader_target: null
  max_steps: 40
  max_epochs: 4
  seed: 7
  python_executable: null
  env: {}
