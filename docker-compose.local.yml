name: mlevolve

services:
  qdrant:
    image: qdrant/qdrant:v1.12.6
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5.26
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: "neo4j/${LOCALML_SCHEDULER_NEO4J_PASSWORD:-test12345}"
      MLEVOLVE_NEO4J_PASSWORD: "${LOCALML_SCHEDULER_NEO4J_PASSWORD:-test12345}"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$${MLEVOLVE_NEO4J_PASSWORD}\" 'RETURN 1;'"]
      interval: 10s
      timeout: 10s
      retries: 18

volumes:
  qdrant_data:
    name: mlevolve_qdrant
  neo4j_data:
    name: mlevolve_neo4j_data
  neo4j_logs:
    name: mlevolve_neo4j_logs
