name: mlevolve

services:
  qdrant:
    image: qdrant/qdrant:v1.12.6
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j-profile:
    image: neo4j:5.26
    restart: unless-stopped
    ports:
      - "${NEO4J_PROFILE_HTTP_PORT:-7474}:7474"
      - "${NEO4J_PROFILE_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: "neo4j/${LOCALML_SCHEDULER_NEO4J_PASSWORD:-test12345}"
      MLEVOLVE_NEO4J_PASSWORD: "${LOCALML_SCHEDULER_NEO4J_PASSWORD:-test12345}"
    volumes:
      - neo4j_profile_data:/data
      - neo4j_profile_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$${MLEVOLVE_NEO4J_PASSWORD}\" 'RETURN 1;'"]
      interval: 10s
      timeout: 10s
      retries: 18

  neo4j-hardware:
    image: neo4j:5.26
    restart: unless-stopped
    ports:
      - "${NEO4J_HARDWARE_HTTP_PORT:-7475}:7474"
      - "${NEO4J_HARDWARE_BOLT_PORT:-7688}:7687"
    environment:
      NEO4J_AUTH: "neo4j/${LOCALML_SCHEDULER_HARDWARE_NEO4J_PASSWORD:-test12345}"
      MLEVOLVE_NEO4J_PASSWORD: "${LOCALML_SCHEDULER_HARDWARE_NEO4J_PASSWORD:-test12345}"
    volumes:
      - neo4j_hardware_data:/data
      - neo4j_hardware_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$${MLEVOLVE_NEO4J_PASSWORD}\" 'RETURN 1;'"]
      interval: 10s
      timeout: 10s
      retries: 18

volumes:
  qdrant_data:
    name: mlevolve_qdrant
  neo4j_profile_data:
    name: mlevolve_neo4j_profile_data
  neo4j_profile_logs:
    name: mlevolve_neo4j_profile_logs
  neo4j_hardware_data:
    name: mlevolve_neo4j_hardware_data
  neo4j_hardware_logs:
    name: mlevolve_neo4j_hardware_logs
