- torch.compile(mode='max-autotune')
- CUDA Graphs for hot loop
- DataLoader pin_memory=True
- cap peak VRAM at 14000 MiB per job
- flash-attn v3 for attention
- fp8 via transformer_engine (inference only)
avoid_patterns:
- no FP64 matmul or weights
- no NVLink or P2P (PCIe only)
