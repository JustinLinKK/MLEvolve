recommended_patterns:
- Keep batch size, precision, accumulation in top-level config
- bf16 autocast default
- TF32 on for FP32 matmul
- cudnn.benchmark=True
- torch.compile(mode='max-autotune')
- CUDA Graphs for hot loop
- DataLoader pin_memory=True
- flash-attn v3 for attention (sm_89 fwd via CUTLASS)
- cap peak VRAM at 22000 MiB per job
- fp8 inference via transformer_engine
avoid_patterns:
- no FP64 matmul (consumer Ada 1:64 ratio)
- no NVLink (PCIe only)
- no MIG (consumer card)
