recommended_patterns:
- Keep batch size, precision, accumulation in top-level config
- bf16 autocast default
- TF32 on for FP32 matmul
- cudnn.benchmark=True
- FP64 OK on this chip (1:2 ratio, 9.7 TFLOPS)
- use NVLink + NCCL all_reduce for multi-GPU
- MIG partitioning for inference packing
- cap peak VRAM at 80896 MiB per job
- flash-attn v2 for transformer attention (v3 is Hopper-only)
avoid_patterns:
- no fp8 (sm_80 lacks FP8 path)
- no Blackwell-only kernels (no FP4, no 5gen TC)
