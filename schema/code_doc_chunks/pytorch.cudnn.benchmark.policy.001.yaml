chunk_id: pytorch.cudnn.benchmark.policy.001
title: cuDNN benchmark vs deterministic flags
text: 'Set torch.backends.cudnn.benchmark=True so cuDNN autotunes the fastest kernel per input shape. Requires static shapes - dynamic shapes cause repeated autotune storms. Set torch.backends.cudnn.deterministic=True only when bit-exact reproducibility is required (paper repro, numerical debug); deterministic mode forbids atomicAdd-based kernels and reduces throughput (benchmark on your workload to quantify). Production training should keep benchmark=True, deterministic=False, and rely on seeded RNG + checkpoint for repro.

  '
