chunk_id: cuda.graphs.training_loop.001
title: CUDA Graphs to amortize launch latency
text: 'CUDA Graphs capture a sequence of kernel launches into a single replayable object, eliminating per-step CPU launch overhead. Best for training loops with many small kernels and fixed shapes. Use torch.cuda.graph(g) context around a warm-up step then graph.replay() per training step. Cannot contain CPU-GPU sync, dynamic shapes, or DataLoader fetch. Combine with cudnn.benchmark=True so the captured graph uses the autotuned kernels.

  '
