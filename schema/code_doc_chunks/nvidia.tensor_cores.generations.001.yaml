chunk_id: nvidia.tensor_cores.generations.001
title: NVIDIA Tensor Core generations 1gen through 5gen
text: |
  NVIDIA Tensor Cores are specialized matrix-multiply units that
  accelerate AI matrix math. The latest fifth-generation Tensor Cores
  ship in NVIDIA Blackwell. On Blackwell, Tensor Cores include FP4
  precision, doubling performance and efficiency through a
  second-generation Transformer Engine. Supported Tensor Core
  precisions on Blackwell are NVFP4, FP64, TF32, BF16, FP16, FP8/FP6,
  and INT8. For per-generation dtype history across earlier
  architectures (Volta, Turing, Ampere, Hopper) consult the respective
  NVIDIA architecture whitepapers; this chunk only sources claims
  about the current (Blackwell) generation.
