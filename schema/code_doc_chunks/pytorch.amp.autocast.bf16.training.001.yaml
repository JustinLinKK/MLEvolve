chunk_id: pytorch.amp.autocast.bf16.training.001
title: PyTorch bf16 autocast for training
text: 'Wrap the forward pass and loss computation in torch.amp.autocast(device_type=''cuda'', dtype=torch.bfloat16). bf16 has the same 8-bit exponent as fp32 so no GradScaler is needed; fp16 still requires GradScaler. Use on Ampere+ (compute capability >= 8.0) where tensor cores accelerate bf16 matmul. Cast model weights to fp32; autocast only changes op dtype inside the context. Log resolved dtype, throughput, peak VRAM.

  '
