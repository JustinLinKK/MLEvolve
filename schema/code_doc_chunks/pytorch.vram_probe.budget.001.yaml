schema_version: code_doc_chunk_v1
chunk_id: pytorch.vram_probe.budget.001
title: Probe peak VRAM and set per-job budget
text: |
  Internal MLEvolve protocol: before launching a job, run one
  forward+backward step with a small batch and read
  torch.cuda.max_memory_allocated() (the PyTorch CUDA notes describe
  memory_allocated() and max_memory_allocated() as the way to monitor
  memory occupied by tensors). Scale by the batch ratio to project
  peak VRAM for the target batch. Reserve headroom for allocator
  fragmentation and cuBLAS workspaces (per the notes, each cuBLAS
  handle/stream combination allocates a cuBLAS workspace, and
  fragmentation can prevent borderline workloads from completing
  without running out of memory). The MLEvolve scheduler uses these
  probes to choose packing across MPS, CUDA streams, and separate
  CUDA processes without triggering out-of-memory errors. Internal
  numeric defaults (e.g. ~14000 MiB cap on 16 GiB GPUs, ~28000 MiB
  cap on 32 GiB GPUs) are scheduler policy, not from the source page.
