schema_version: code_doc_chunk_v1
chunk_id: pytorch.vram_probe.budget.001
title: Probe peak VRAM and set per-job budget
text: 'Before launching a job, run one forward+backward step with a small batch and measure torch.cuda.max_memory_allocated(). Multiply by batch ratio to project for the target batch. Reserve 1-2 GiB headroom for cuDNN workspace and fragmentation. On a 16 GiB GPU cap effective peak below 14000 MiB. On 32 GiB GPU cap below 28000 MiB. The scheduler uses these probes to decide MPS / stream / cuda_process packing without OOM.

  '
