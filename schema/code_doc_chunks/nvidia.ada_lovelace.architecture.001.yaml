chunk_id: nvidia.ada_lovelace.architecture.001
title: NVIDIA Ada Lovelace (RTX 40 / L40 / L4) architecture summary
text: |
  Ada Lovelace is the NVIDIA GeForce RTX 40 Series GPU architecture.
  Ada introduces fourth-generation Tensor Cores together with the FP8
  Transformer Engine first introduced in the Hopper H100, increasing
  throughput up to 5x to 1.4 Tensor-petaFLOPS. Ada also brings
  third-generation RT Cores with twice the ray-triangle intersection
  throughput, and eighth-generation NVENC with AV1 encoders
  (not relevant for ML training). For ML use, target FP8 inference
  via Transformer Engine on RTX 40 Series GPUs.
