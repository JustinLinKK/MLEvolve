chunk_id: nvidia.int8.quantization.training.001
title: int8 quantization for inference and QAT
text: |
  PyTorch supports INT8 quantization through torch.ao.quantization with
  per-tensor and per-channel scales (quantize_per_tensor,
  quantize_per_channel). Two common workflows are exposed:

    Dynamic / post-training: quantize_dynamic replaces Linear modules
      with int8 quantized variants (activations are quantized on the
      fly at inference time).
    QAT (quantization-aware training): prepare_qat inserts
      fake-quantize ops (torch.fake_quantize_*) into the model so
      fine-tuning learns to tolerate quantization noise; the model
      is then convert-ed to a real int8 graph.

  Use quantize_dynamic for transformer inference and prepare_qat for
  fine-tuning workflows; see the eager-mode API list under
  torch.ao.quantization in the docs.
