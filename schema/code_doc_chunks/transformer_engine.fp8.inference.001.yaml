chunk_id: transformer_engine.fp8.inference.001
title: NVIDIA Transformer Engine fp8 path
text: 'Transformer Engine wraps GEMM and attention with FP8 quantization (E4M3 for forward activations, E5M2 for gradients). Use the te.fp8_autocast context for inference on Hopper (sm_90) and Blackwell (sm_100/120). FP8 training remains unstable for general LLMs - keep to inference and benchmark loss curves vs bf16 before adopting. Requires CUDA >= 12.1 and TE >= 1.0. Combine with FlashAttention for end-to-end fp8 attention.

  '
