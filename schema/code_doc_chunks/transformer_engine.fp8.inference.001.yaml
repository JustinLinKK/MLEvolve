example_code: 'import torch

  device = ''cuda'' if torch.cuda.is_available() else ''cpu''

  x_e4m3 = torch.empty(8, 8, dtype=torch.float8_e4m3fn, device=device)

  x_e5m2 = torch.empty(8, 8, dtype=torch.float8_e5m2, device=device)

  y = torch.randn(8, 8, device=device).to(torch.float8_e4m3fn)

  back = y.to(torch.float32)'
