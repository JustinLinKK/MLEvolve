schema_version: code_doc_chunk_v1
chunk_id: transformer_engine.fp8.inference.001
title: NVIDIA Transformer Engine fp8 path
text: |
  NVIDIA Transformer Engine accelerates Transformer training and
  inference with FP8 and FP4 precision on Hopper, Ada and Blackwell
  GPUs. Wrap the forward pass in te.fp8_autocast with a
  recipe.DelayedScaling recipe (fp8_format=recipe.Format.E4M3 or
  HYBRID); TE inserts per-tensor amax tracking and applies the scale
  automatically. The README reports that fp8/mxfp8 training loss
  curves match bf16 on tested LLMs, so FP8 can be used for both
  training and inference. Software requirements per README: CUDA 12.1+
  on Hopper/Ada/Ampere or 12.8+ on Blackwell, plus cuDNN 9.3+. Can be
  combined with the bundled FlashAttention path.
