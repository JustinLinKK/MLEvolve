chunk_id: nvidia.tf32.matmul.policy.001
title: TF32 tensor-core path for FP32 matmul
text: |
  TensorFloat-32 (TF32) is a math mode introduced with the third
  generation of Tensor Cores in the NVIDIA Ampere architecture for
  accelerating FP32 convolutions and matrix math. TF32 uses 10 bits
  of mantissa and one sign bit, while preserving the same range as
  FP32. TF32 Tensor Cores in A100 GPUs operate on FP32 inputs and
  produce FP32 outputs without code changes; only the matmul
  reduction runs in TF32 internally.
