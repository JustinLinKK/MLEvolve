example_code: 'import torch

  import torch.nn as nn

  device = ''cuda'' if torch.cuda.is_available() else ''cpu''

  model = nn.Linear(64, 32).to(device)

  compiled = torch.compile(model)

  x = torch.randn(8, 64, device=device)

  y = compiled(x)'
