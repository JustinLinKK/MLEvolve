chunk_id: pytorch.compile.max_autotune.001
title: torch.compile with mode='max-autotune'
text: |
  torch.compile(model, mode='max-autotune') routes through the
  Inductor backend (default backend='inductor') and uses Triton or
  template-based matmul plus Triton-based convolutions on GPU;
  max-autotune profiles to pick the best matmul configuration and
  enables CUDA Graphs by default on GPU. The epilogue_fusion option
  (requires max_autotune) fuses pointwise ops into matmul templates.
  To reduce repeated recompilation under shape variation, pass
  dynamic=False or accept the recompile_limit ceiling (default 8)
  before the compiled function falls back to eager.
