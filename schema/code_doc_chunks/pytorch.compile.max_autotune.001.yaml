chunk_id: pytorch.compile.max_autotune.001
title: torch.compile with mode='max-autotune'
text: 'torch.compile(model, mode=''max-autotune'') uses the Inductor backend to fuse pointwise ops, generate Triton kernels, and search over kernel schedules. Best for steady-state hot loops with static shapes. First iteration is slow (compile + autotune); steady-state steps run faster on transformer/CNN training (benchmark to quantify on your model). sm_120 (Blackwell GeForce) is stable from PyTorch 2.7+ (initial 2.6 support was incomplete). Avoid recompilation by disabling dynamic shapes (torch._dynamo.config.dynamic_shapes=False) when batch is fixed.

  '
