chunk_id: pytorch.compile.max_autotune.001
title: torch.compile with mode='max-autotune'
text: 'torch.compile(model, mode=''max-autotune'') uses the Inductor backend to fuse pointwise ops, generate Triton kernels, and search over kernel schedules. Best for steady-state hot loops with static shapes. First iteration is slow (compile + autotune); subsequent steps see 1.3x-2x speedup on transformer/CNN training. sm_120 (Blackwell GeForce) is supported from PyTorch 2.6. Avoid recompilation by disabling dynamic shapes (torch._dynamo.config.dynamic_shapes=False) when batch is fixed.

  '
