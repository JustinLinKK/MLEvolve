chunk_id: nvidia.fp4.blackwell.001
title: FP4 (E2M1) on Blackwell 5th-gen Tensor Cores
text: |
  FP4 (E2M1) is a 4-bit floating-point format with 1 sign bit,
  2 exponent bits, and 1 mantissa bit, plus a software scaling factor.
  Fifth-generation NVIDIA Blackwell Tensor Cores accelerate ultra-low
  precision FP4 formats.

  Two block-scaled FP4 variants are described by NVIDIA:

    MXFP4: block size 32 elements, scale dtype e8m0 (power-of-two scale).
    NVFP4: block size 16 elements, scale dtype e4m3 with an additional
           FP32 per-tensor scalar. The smaller block and the higher-
           precision e4m3 scale factor reduce quantization error
           relative to MXFP4.

  NVFP4 is used for low-precision inference, including post-training
  quantization (PTQ) of weights from a higher-precision checkpoint.
