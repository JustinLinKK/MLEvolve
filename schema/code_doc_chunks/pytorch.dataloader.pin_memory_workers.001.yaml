chunk_id: pytorch.dataloader.pin_memory_workers.001
title: DataLoader pin_memory and num_workers tuning
text: 'Set DataLoader(pin_memory=True) so host-side tensors land in page-locked memory and async H2D transfers can overlap with compute. Set num_workers to roughly half the CPU thread count - higher values starve the main process and saturate disk. Also set persistent_workers=True to avoid worker respawn each epoch, and prefetch_factor=4 to keep the GPU fed. Use non_blocking=True on .to(device) calls. Symptoms of misconfig: low SM utilization with high CPU usage and idle GPU between steps.

  '
