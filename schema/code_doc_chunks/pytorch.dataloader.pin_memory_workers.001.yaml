chunk_id: pytorch.dataloader.pin_memory_workers.001
title: DataLoader pin_memory and num_workers tuning
text: |
  Set DataLoader(pin_memory=True) so that the loader automatically
  puts fetched data tensors in pinned (page-locked) memory; per the
  docs, host-to-GPU copies are much faster when they originate from
  pinned memory. Use num_workers>0 to enable multi-process data
  loading and tune prefetch_factor (default 2 when num_workers>0,
  meaning 2 * num_workers batches prefetched across workers) to keep
  batches loaded in advance. Set persistent_workers=True so the data
  loader will not shut down the worker processes after a dataset has
  been consumed once, keeping the worker dataset instances alive
  across epochs.
