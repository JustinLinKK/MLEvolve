chunk_id: flash_attn.v3.usage.001
title: FlashAttention v3 for transformer self-attention
text: |
  FlashAttention-3 (beta release) is an IO-aware fused attention
  kernel optimized for Hopper and Blackwell GPUs (for example H100
  and B200). It replaces standard self-attention to reduce memory
  traffic of the attention matrix. The Python entry point is
  flash_attn_interface.flash_attn_func(q, k, v, causal=True). For
  FA2 on Ampere or Ada (A100, RTX 3090, RTX 4090, H100), use the
  flash_attn package. Supported dtypes on the CUDA path are fp16 and
  bf16. HuggingFace integration is available via the huggingface
  kernels library.
