chunk_id: flash_attn.v3.usage.001
title: FlashAttention v3 for transformer self-attention
text: 'flash-attn v3 (sm_90+ kernels, also runs on sm_120 Blackwell GeForce) replaces standard self-attention with a fused IO-aware kernel that does not materialize the N x N attention matrix. Memory drops from O(N^2) to O(N), throughput improves 1.5x-3x for long sequences. Use flash_attn_func(q, k, v, causal=True) or hook into HuggingFace transformers via attn_implementation=''flash_attention_2''. Requires contiguous tensors with dtype bf16 or fp16; will OOM-fallback on fp32.

  '
