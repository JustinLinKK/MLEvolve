chunk_id: nvidia.fp8.e4m3_vs_e5m2.001
title: FP8 E4M3 vs E5M2 dynamic range tradeoff
text: |
  NVIDIA Transformer Engine supports two FP8 encodings (per the FP8
  primer): E4M3 with 1 sign + 4 exponent + 3 mantissa bits, and E5M2
  with 1 sign + 5 exponent + 2 mantissa bits. E4M3 represents values
  in the range of approximately +/-448, while E5M2 reaches
  approximately +/-57344 (matching the FP16 exponent range). E4M3 is
  used for the forward pass (weights and activations), and E5M2 is
  used for the backward pass (gradients) where wider dynamic range
  matters more than precision. Per-tensor scaling factors are
  required; Transformer Engine selects scales using Delayed Scaling,
  which keeps an amax history across recent steps. FP8 Tensor Cores
  are available on H100 (Hopper), Ada Lovelace, and Blackwell GPUs.
