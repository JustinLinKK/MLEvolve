schema_version: optimization_recipe_chunk_v1
recipe_id: hardware_feature_recipe.nvidia.hopper.h200_sxm_141gb.spec
title: NVIDIA H200 SXM 141GB optimization recipe
problem_statement: Optimize vision_training / transformer_training / generative_ai / llm_training / hpc on NVIDIA H200 SXM 141GB
solution_summary: Keep batch size, precision, accumulation in top-level config; bf16 autocast default; fp8 training+inference via transformer_engine (E4M3 fwd, E5M2 grad); TF32 on for FP32 matmul; cudnn.benchmark=True for static shapes; FP64 OK on this chip (1:2 ratio); fit larger batches given 141 GiB HBM3e; NVLink for multi-GPU all_reduce; MIG up to 7 partitions for inference; flash-attn v3; cap peak VRAM at 135 GiB per job
text: 'Recommended patterns:

  - Keep batch size, precision, accumulation in top-level config

  - bf16 autocast default

  - fp8 training+inference via transformer_engine (E4M3 fwd, E5M2 grad)

  - TF32 on for FP32 matmul

  - cudnn.benchmark=True for static shapes

  - FP64 OK on this chip (1:2 ratio)

  - fit larger batches given 141 GiB HBM3e

  - NVLink for multi-GPU all_reduce

  - MIG up to 7 partitions for inference

  - flash-attn v3

  - cap peak VRAM at 135 GiB per job


  Avoid patterns:

  - no FP4 (Blackwell-only)'
recommended_patterns:
- Keep batch size, precision, accumulation in top-level config
