schema_version: optimization_recipe_chunk_v1
recipe_id: hardware_feature_recipe.nvidia.ampere.a100_sxm4_80gb.spec
title: NVIDIA A100 SXM4 80GB optimization recipe
problem_statement: Optimize vision_training / transformer_training / generative_ai / hpc on NVIDIA A100 SXM4 80GB
solution_summary: Keep batch size, precision, accumulation in top-level config; bf16 autocast default; TF32 on for FP32 matmul; cudnn.benchmark=True; FP64 OK on this chip (1:2 ratio, 9.7 TFLOPS); use NVLink + NCCL all_reduce for multi-GPU; MIG partitioning for inference packing; cap peak VRAM at 75 GiB per job; flash-attn v2 for transformer attention (v3 is Hopper-only)
text: 'Recommended patterns:

  - Keep batch size, precision, accumulation in top-level config

  - bf16 autocast default

  - TF32 on for FP32 matmul

  - cudnn.benchmark=True

  - FP64 OK on this chip (1:2 ratio, 9.7 TFLOPS)

  - use NVLink + NCCL all_reduce for multi-GPU

  - MIG partitioning for inference packing

  - cap peak VRAM at 75 GiB per job

  - flash-attn v2 for transformer attention (v3 is Hopper-only)


  Avoid patterns:

  - no fp8 (sm_80 lacks FP8 path)

  - no Blackwell-only kernels (no FP4, no 5gen TC)'
recommended_patterns:
- Keep batch size, precision, accumulation in top-level config
- bf16 autocast default
- TF32 on for FP32 matmul
- cudnn.benchmark=True
- FP64 OK on this chip (1:2 ratio, 9.7 TFLOPS)
- use NVLink + NCCL all_reduce for multi-GPU
- MIG partitioning for inference packing
- cap peak VRAM at 75 GiB per job
- flash-attn v2 for transformer attention (v3 is Hopper-only)
avoid_patterns:
- no fp8 (sm_80 lacks FP8 path)
- no Blackwell-only kernels (no FP4, no 5gen TC)
