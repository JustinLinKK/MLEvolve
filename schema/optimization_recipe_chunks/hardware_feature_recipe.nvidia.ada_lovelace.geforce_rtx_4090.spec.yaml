schema_version: optimization_recipe_chunk_v1
recipe_id: hardware_feature_recipe.nvidia.ada_lovelace.geforce_rtx_4090.spec
title: GeForce RTX 4090 optimization recipe
problem_statement: Optimize vision_training / transformer_training / generative_ai on GeForce RTX 4090
solution_summary: Keep batch size, precision, accumulation in top-level config; bf16 autocast default; TF32 on for FP32 matmul; cudnn.benchmark=True; torch.compile(mode='max-autotune'); CUDA Graphs for hot loop; DataLoader pin_memory=True; flash-attn v3 for attention (sm_89 fwd via CUTLASS); cap peak VRAM at 22000 MiB per job; fp8 inference via transformer_engine
text: 'Recommended patterns:

  - Keep batch size, precision, accumulation in top-level config

  - bf16 autocast default

  - TF32 on for FP32 matmul

  - cudnn.benchmark=True

  - torch.compile(mode=''max-autotune'')

  - CUDA Graphs for hot loop

  - DataLoader pin_memory=True

  - flash-attn v3 for attention (sm_89 fwd via CUTLASS)

  - cap peak VRAM at 22000 MiB per job

  - fp8 inference via transformer_engine


  Avoid patterns:

  - no FP64 matmul (consumer Ada 1:64 ratio)

  - no NVLink (PCIe only)

  - no MIG (consumer card)'
recommended_patterns:
- Keep batch size, precision, accumulation in top-level config
- bf16 autocast default
- TF32 on for FP32 matmul
- cudnn.benchmark=True
- torch.compile(mode='max-autotune')
- CUDA Graphs for hot loop
- DataLoader pin_memory=True
- flash-attn v3 for attention (sm_89 fwd via CUTLASS)
- cap peak VRAM at 22000 MiB per job
- fp8 inference via transformer_engine
avoid_patterns:
- no FP64 matmul (consumer Ada 1:64 ratio)
- no NVLink (PCIe only)
- no MIG (consumer card)
