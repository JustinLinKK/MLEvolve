title: GeForce RTX 5090 optimization recipe
problem_statement: Optimize vision_training / transformer_training / generative_ai on GeForce RTX 5090
solution_summary: bf16 autocast default; TF32 on for FP32 matmul; cudnn.benchmark=True for static shapes; torch.compile(mode='max-autotune'); CUDA Graphs for hot loop; DataLoader pin_memory=True; cap peak VRAM at 28000 MiB per job; flash-attn v3 for attention; fp8 via transformer_engine (inference only)
text: 'Recommended patterns:

  - bf16 autocast default

  - TF32 on for FP32 matmul

  - cudnn.benchmark=True for static shapes

  - torch.compile(mode=''max-autotune'')

  - CUDA Graphs for hot loop

  - DataLoader pin_memory=True

  - cap peak VRAM at 28000 MiB per job

  - flash-attn v3 for attention

  - fp8 via transformer_engine (inference only)


  Avoid patterns:

  - no FP64 matmul or weights

  - no NVLink or P2P (PCIe only)'
