	<style>
		:root {
			--bg: #f6f7fb;
			--card: #ffffff;
			--text: #111827;
			--muted: #6b7280;
			--border: #ccc;
			--progress-bg: #e5e7eb;
			--progress-fill: #16a34a;
			--btn-bg: #2563eb;
			--error: #dc2626;
		}

		@media (prefers-color-scheme: dark) {
			:root {
				--bg: #111827;
				--card: #1f2937;
				--text: #f3f4f6;
				--muted: #9ca3af;
				--border: #374151;
				--progress-bg: #374151;
				--progress-fill: #22c55e;
				--btn-bg: #3b82f6;
				--error: #ef4444;
			}
		}

		* {
			box-sizing: border-box;
		}

		/* mobile-first */
		body {
			margin: 0;
			min-height: 100svh;
			display: flex;
			justify-content: center;
			align-items: flex-start;
			padding: 10vh 1rem 2rem;
			background: var(--bg);
			color: var(--text);
			font: 16px/1.6 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
		}

		.card {
			width: 100%;
			max-width: 720px;
			background: var(--card);
			border: 1px solid var(--border);
			border-radius: 4px;
			padding: 24px;
			box-shadow: 0 12px 28px rgba(0,0,0,.07);
		}

		h1 {
			margin: 0 0 .5rem;
			font-size: 1.6rem;
			line-height: 1.25;
		}

		p {
			margin: 0 0 .75rem;
		}

		/* bigger, clearer message */
		.lead {
			font-size: 1.1875rem; /* ~19px */
			line-height: 1.55;
			font-weight: 600;
		}

		.muted {
			color: var(--muted);
		}

		/* meta list: mobile stacked, slightly smaller text */
		dl.meta {
			margin: .75rem 0 0;
			display: grid;
			grid-template-columns: 1fr; /* mobile: stack */
			row-gap: .25rem;
			column-gap: .75rem;
			word-break: break-word;
			font-size: .9rem; /* smaller than body */
			color: var(--muted); /* deemphasize */
		}

			dl.meta dt {
				font-weight: 600;
				margin-top: .5rem;
			}

				dl.meta dt:first-child {
					margin-top: 0;
				}

			dl.meta dd {
				margin: 0;
				font-weight: 400;
				font-variant-numeric: tabular-nums;
			}

		footer {
			margin-top: 1.25rem;
			font-size: .875rem;
			color: var(--muted);
		}

			footer a {
				color: inherit;
				text-decoration: underline;
			}

				footer a:hover {
					color: var(--text);
				}

		/* wider viewports: inline two-column meta grid */
		@media (min-width: 640px) {
			dl.meta {
				grid-template-columns: auto 1fr;
			}

				dl.meta dt {
					margin-top: 0;
				}

				dl.meta dd {
					margin-left: .25rem;
				}

			.card {
				padding: 28px;
			}

			h1 {
				font-size: 1.75rem;
			}
		}
	</style>
