# Per-feature authoritative documentation URLs.
#
# Design note: this file is the single source of truth for the "what does this
# feature tag mean and where is its spec" mapping. We put it here, separate
# from Schema A spec records, because:
#   - Feature tags are reused across many Schema A records (one tag -> many
#     accelerator specs). Inlining the URL into every A record would duplicate
#     the same string dozens of times and drift on update.
#   - Schema A records describe a single accelerator's capabilities; they
#     should not own the global semantic dictionary.
#   - Schema B chunks are per-source-snippet (different abstraction); they
#     are not the right home either.
# Hence: option (a) -- a single global file mapping feature_tag -> doc URL.
#
# Verification: see verify_feature_docs.py at repo root.
# Date format: YYYY-MM-DD (ISO 8601).

