schema_version: "2.0"

description: >
  Result-oriented graph schema for training/profiling evidence. This schema is
  intentionally not a control-plane schema for agent requests. It records what
  actually happened during single-model jobs, packed jobs, and probes so future
  agents and the scheduler can reuse the evidence when tuning training code,
  selecting batch sizes, estimating runtime, and deciding whether models can be
  packed together.

modeling_notes:
  - >
    Job is a shared label/interface, not a separate physical master node.
    Store concrete records as (:Job:SingleJob) or (:Job:PackedJob).
  - >
    SingleJob means one model/workload ran alone. It can represent full
    training, partial runtime probes, memory probes, or batch-size probes.
  - >
    PackedJob means one concurrent multi-model execution group. Group-level
    packing evidence belongs on PackedJob; per-model hyperparameters and
    outcomes belong on PackedJobMember.
  - >
    TrainingConfig is an immutable hyperparameter/workload snapshot keyed by a
    canonical hash. Result nodes may keep denormalized lookup keys, but
    TrainingConfig is the reusable source of config identity.
  - >
    Observed values are hard facts from the measured run. Estimated values are
    extrapolations for planning and must include an estimation method and
    confidence when present.
  - >
    Hardware nodes record observed hardware and runtime-stack specifications.
    Job-to-hardware relationships record the actual resource slice used by a
    job, such as allocated CPU threads, visible GPUs, memory caps, MIG slices,
    or scheduler/container limits.
  - >
    Capability names such as tensor_cores, tensor_core_v5, bf16, fp16, amp,
    cuda_graphs, mps, or rocm should be stored as string lists on Job and
    Hardware. Detailed explanations, version-specific docs, and coding guidance
    live in the vector database keyed by those strings.

node_types:
  Job:
    label: Job
    abstract: true
    category: evidence
    key: job_id

    description: >
      Shared evidence interface for job result records. Do not create a
      standalone Job node. Concrete records should be stored with either
      (:Job:SingleJob) or (:Job:PackedJob) labels.

    properties:
      # ============================================================
      # Identity / lookup
      # ============================================================

      job_id:
        type: string
        required: true
        unique: true
        description: >
          Unique identifier for this observed result record.

      profile_key:
        type: string
        required: true
        indexed: true
        description: >
          Stable reuse key for deduplication and lookup. For SingleJob this
          should include model, hardware, technology tags, workload/config, memory
          cap, and probe/training scope. For PackedJob this should include the
          packed member vector, hardware, technology tags, packing strategy, and
          memory cap.

      purpose:
        type: string
        required: true
        indexed: true
        allowed_values:
          - baseline_benchmark
          - memory_probe
          - runtime_probe
          - batch_size_probe
          - compatibility_probe
          - smoke_test
          - real_training
          - packed_benchmark
          - packed_training
        description: >
          Why this result was recorded. This is about the observation, not a
          pending request from an agent.

      status:
        type: string
        required: true
        indexed: true
        allowed_values:
          - succeeded
          - failed
          - partial
          - timeout
          - oom
          - killed
        description: >
          Final observed result status.

      # ============================================================
      # Denormalized lookup keys
      # Source of truth should still be relationships to dimension
      # nodes such as Model, Hardware, and TrainingConfig.
      # ============================================================

      hardware_set_key:
        type: string
        required: true
        indexed: true
        description: >
          Canonical hash/string for the hardware used by this observation.

      technology_keys:
        type: string_list
        required: false
        description: >
          String identifiers for technologies, features, or runtime techniques
          used by this job result, such as cuda, rocm, amp, bf16, fp16, mps,
          cuda_streams, tensor_cores, or power_of_two_batch_search. These keys
          are resolved to detailed guidance in the vector database.

      technology_set_key:
        type: string
        required: false
        indexed: true
        description: >
          Optional canonical hash/string for technology_keys. Use this only as
          a fast lookup/deduplication key; technology_keys is the readable list.

      code_variant_key:
        type: string
        required: false
        indexed: true
        description: >
          Optional canonical key for the generated or hand-written training
          code variant that produced this result.

      dataset_key:
        type: string
        required: false
        indexed: true
        description: >
          Optional canonical dataset or benchmark key.

      # ============================================================
      # Measurement scope / completeness
      # ============================================================

      run_scope:
        type: string
        required: true
        indexed: true
        allowed_values:
          - full_training
          - full_epoch
          - partial_epoch
          - fixed_steps
          - warmup_only
          - dry_run
        description: >
          How complete the observed execution was. Probes should usually be
          fixed_steps, partial_epoch, or warmup_only rather than full_training.

      confidence:
        type: float
        required: false
        indexed: true
        description: >
          Evidence confidence from 0.0 to 1.0. Partial probes should normally
          have lower confidence for full-epoch or total-training-time estimates.

      # ============================================================
      # Whole-job observed resource measurements
      # For SingleJob these are the one model's measurements.
      # For PackedJob these are group-level aggregate measurements.
      # ============================================================

      avg_vram_mb:
        type: integer
        required: false
        description: >
          Average VRAM usage during the measured part of the job.

      peak_vram_mb:
        type: integer
        required: false
        indexed: true
        description: >
          Peak observed VRAM usage for the whole job. For PackedJob, this is
          the packed group peak, not a single member's peak.

      avg_vram_utilization_pct:
        type: float
        required: false

      peak_vram_utilization_pct:
        type: float
        required: false

      avg_sm_utilization_pct:
        type: float
        required: false
        indexed: true
        description: >
          Average SM utilization percentage when available.

      peak_sm_utilization_pct:
        type: float
        required: false

      avg_gpu_utilization_pct:
        type: float
        required: false
        description: >
          Average GPU utilization percentage if reported separately from SM
          usage.

      peak_gpu_utilization_pct:
        type: float
        required: false

      avg_cpu_utilization_pct:
        type: float
        required: false

      peak_cpu_utilization_pct:
        type: float
        required: false

      avg_ram_mb:
        type: integer
        required: false

      peak_ram_mb:
        type: integer
        required: false

      # ============================================================
      # Whole-job observed runtime / throughput
      # ============================================================

      observed_duration_seconds:
        type: float
        required: false
        description: >
          Actual wall-clock duration observed for this run/probe.

      startup_seconds:
        type: float
        required: false
        description: >
          Startup or warmup time before stable measurement.

      observed_avg_step_time_ms:
        type: float
        required: false
        indexed: true
        description: >
          Average observed step time after ignored warmup steps.

      observed_p50_step_time_ms:
        type: float
        required: false

      observed_p95_step_time_ms:
        type: float
        required: false

      observed_p99_step_time_ms:
        type: float
        required: false

      observed_throughput_samples_per_sec:
        type: float
        required: false

      observed_throughput_tokens_per_sec:
        type: float
        required: false

      warmup_steps_ignored:
        type: integer
        required: false
        description: >
          Number of warmup steps excluded from utilization and runtime averages.

      measurement_window_steps:
        type: integer
        required: false
        description: >
          Number of stable steps used for reported measurements.

      # ============================================================
      # Raw / fallback data
      # ============================================================

      metrics_json:
        type: string
        required: false
        description: >
          JSON fallback for extra metrics that are not worth modeling as
          first-class properties.

      error_message:
        type: string
        required: false
        description: >
          Error message if status is failed, partial, timeout, oom, or killed.

      notes:
        type: string
        required: false

      # ============================================================
      # Time
      # ============================================================

      created_at:
        type: datetime
        required: false
        indexed: true

      started_at:
        type: datetime
        required: false

      finished_at:
        type: datetime
        required: false
        indexed: true

    recommended_constraints:
      - type: uniqueness
        property: job_id

    recommended_indexes:
      - profile_key
      - purpose
      - status
      - hardware_set_key
      - technology_set_key
      - code_variant_key
      - dataset_key
      - run_scope
      - confidence
      - peak_vram_mb
      - avg_sm_utilization_pct
      - observed_avg_step_time_ms
      - finished_at

  Hardware:
    label: Hardware
    category: evidence_dimension
    key: hardware_key

    description: >
      Observed hardware and runtime-stack specification used by jobs. A
      Hardware node may represent a host CPU/node, one accelerator device, or a
      stable hardware environment snapshot. Feature capabilities such as tensor
      cores, bf16, fp16, sparsity, or feature-specific guidance should be
      stored as string keys on technology_keys and resolved to detailed
      explanation through the vector database.

      If driver or toolkit versions materially affect behavior, create a new
      hardware_key for that observed environment or include versioned
      technology keys such as cuda_12_8, rocm_6_3, tensor_core_v5, or
      bf16_native.

    properties:
      # ============================================================
      # Identity / retrieval text
      # ============================================================

      hardware_key:
        type: string
        required: true
        unique: true
        description: >
          Canonical key for this hardware or hardware-environment record. For
          accelerator devices this should include vendor, device/SKU, major
          architecture identity, and runtime stack when relevant.

      # ============================================================
      # Vendor / product identity
      # ============================================================

      hardware_kind:
        type: string
        required: true
        indexed: true
        allowed_values:
          - gpu
          - cpu
          - accelerator
          - host_node
          - cluster_node
          - other
        description: >
          Broad hardware category. Use gpu for NVIDIA/AMD GPUs, cpu for a CPU
          package or CPU inventory record, and host_node/cluster_node for a
          machine-level environment record.

      vendor:
        type: string
        required: true
        indexed: true
        examples:
          - nvidia
          - amd
          - intel
          - apple

      product_name:
        type: string
        required: true
        indexed: true
        description: >
          Product or device name, such as RTX 5090, H100 SXM, MI300X, or Xeon
          Platinum 8480+.

      sku:
        type: string
        required: false
        indexed: true

      device_uuid:
        type: string
        required: false
        indexed: true
        description: >
          Stable device UUID when available, such as a GPU UUID.

      pci_bus_id:
        type: string
        required: false
        indexed: true

      node_name:
        type: string
        required: false
        indexed: true
        description: >
          Host or cluster node name where this hardware was observed.

      cluster_name:
        type: string
        required: false
        indexed: true

      # ============================================================
      # Architecture / runtime stack
      # ============================================================

      architecture:
        type: string
        required: false
        indexed: true
        examples:
          - blackwell
          - hopper
          - ada
          - ampere
          - cdna3
          - rdna3
          - sapphire_rapids

      architecture_version:
        type: string
        required: false
        indexed: true

      compute_capability:
        type: string
        required: false
        indexed: true
        description: >
          NVIDIA CUDA compute capability when applicable, for example 9.0 or
          12.0.

      gfx_arch:
        type: string
        required: false
        indexed: true
        description: >
          AMD GPU architecture identifier when applicable, for example gfx942.

      accelerator_api:
        type: string
        required: false
        indexed: true
        allowed_values:
          - cuda
          - rocm
          - oneapi
          - metal
          - opencl
          - none
          - other

      driver_version:
        type: string
        required: false
        indexed: true

      toolkit_name:
        type: string
        required: false
        indexed: true
        examples:
          - cuda
          - rocm
          - oneapi

      toolkit_version:
        type: string
        required: false
        indexed: true

      runtime_stack_key:
        type: string
        required: false
        indexed: true
        description: >
          Canonical key for driver/toolkit/runtime versions observed with this
          hardware.

      technology_keys:
        type: string_list
        required: false
        description: >
          String identifiers for hardware-supported technologies and
          capabilities, such as cuda, cuda_12_8, rocm, tensor_cores,
          tensor_core_v5, bf16_native, fp16, sparsity, mps, or cuda_graphs.
          Detailed semantics and docs should live in the vector database.

      technology_set_key:
        type: string
        required: false
        indexed: true
        description: >
          Optional canonical hash/string for technology_keys.

      # ============================================================
      # Accelerator specs
      # ============================================================

      compute_unit_kind:
        type: string
        required: false
        allowed_values:
          - sm
          - cu
          - xe_core
          - core
          - tpu_core
          - npu_core
          - other
        description: >
          Unit used by compute_unit_count. For NVIDIA GPUs this is usually sm;
          for AMD GPUs this is usually cu.

      compute_unit_count:
        type: integer
        required: false
        indexed: true
        description: >
          Number of major accelerator compute units, such as NVIDIA SMs or AMD
          CUs. Feature-specific units or generations like tensor cores should
          be represented with versioned technology_keys.

      total_vram_mb:
        type: integer
        required: false
        indexed: true
        description: >
          Total physical VRAM or accelerator memory capacity.

      vram_type:
        type: string
        required: false
        examples:
          - gddr7
          - gddr6x
          - hbm3
          - hbm3e

      memory_bus_width_bits:
        type: integer
        required: false

      memory_bandwidth_gbps:
        type: float
        required: false

      max_power_watts:
        type: integer
        required: false

      # ============================================================
      # CPU / host specs
      # ============================================================

      cpu_architecture:
        type: string
        required: false
        indexed: true
        examples:
          - x86_64
          - arm64

      cpu_socket_count:
        type: integer
        required: false

      physical_core_count:
        type: integer
        required: false
        indexed: true

      logical_thread_count:
        type: integer
        required: false
        indexed: true
        description: >
          Total logical CPU threads available on this hardware/node. Per-job
          requested or allocated thread counts belong on JOB_USED_HARDWARE.

      numa_node_count:
        type: integer
        required: false

      total_ram_mb:
        type: integer
        required: false
        indexed: true

      vector_extensions_json:
        type: string
        required: false
        description: >
          JSON list of CPU vector extensions such as avx2, avx512_bf16, amx, or
          neon. These can also be mirrored into technology_keys when useful for
          retrieval.

      confidence:
        type: float
        required: false
        indexed: true
        description: >
          Confidence from 0.0 to 1.0 in this hardware spec record.

      created_at:
        type: datetime
        required: false
        indexed: true

      updated_at:
        type: datetime
        required: false
        indexed: true

    recommended_constraints:
      - type: uniqueness
        property: hardware_key

    recommended_indexes:
      - hardware_kind
      - vendor
      - product_name
      - sku
      - device_uuid
      - pci_bus_id
      - node_name
      - cluster_name
      - architecture
      - architecture_version
      - compute_capability
      - gfx_arch
      - accelerator_api
      - driver_version
      - toolkit_name
      - toolkit_version
      - runtime_stack_key
      - technology_set_key
      - compute_unit_count
      - total_vram_mb
      - cpu_architecture
      - physical_core_count
      - logical_thread_count
      - total_ram_mb
      - retrieved_or_verified_date
      - confidence
      - created_at
      - updated_at

  Model:
    label: Model
    category: evidence_dimension
    key: model_key

    description: >
      Model identity and static model properties used by training jobs. This
      node should describe the model architecture, source library, initialized
      weights/checkpoint identity when relevant, and model-level structural
      properties. Training run hyperparameters such as batch size, precision,
      optimizer, learning rate, and epoch/step limits belong in TrainingConfig.

    properties:
      # ============================================================
      # Identity / retrieval text
      # ============================================================

      model_key:
        type: string
        required: true
        unique: true
        description: >
          Canonical model identity key. Include architecture and initialization
          identity when different checkpoints/pretrained weights should be
          treated as different training evidence.

      model_name:
        type: string
        required: true
        indexed: true
        description: >
          Model name used by the training code, such as resnet50,
          convnext_base, vit_base_patch16_224, or a custom model id.

      display_name:
        type: string
        required: false

      # ============================================================
      # Source / framework
      # ============================================================

      framework:
        type: string
        required: false
        indexed: true
        allowed_values:
          - pytorch
          - tensorflow
          - jax
          - sklearn
          - xgboost
          - custom
          - other

      framework_version:
        type: string
        required: false
        indexed: true

      library_name:
        type: string
        required: false
        indexed: true
        examples:
          - timm
          - torchvision
          - transformers
          - diffusers
          - custom

      library_version:
        type: string
        required: false
        indexed: true

      source_name:
        type: string
        required: false
        indexed: true
        description: >
          Source registry, package, repository, or model hub namespace.

      source_uri:
        type: string
        required: false
        description: >
          URI for the source model definition, repository, or model card.

      model_version:
        type: string
        required: false
        indexed: true

      pretrained:
        type: boolean
        required: false
        indexed: true
        description: >
          Whether the model was initialized from pretrained weights.

      checkpoint_key:
        type: string
        required: false
        indexed: true
        description: >
          Canonical key for the initial checkpoint or weights used by training,
          when checkpoint identity matters for reuse.

      checkpoint_path:
        type: string
        required: false

      # ============================================================
      # Architecture / task shape
      # ============================================================

      model_family:
        type: string
        required: false
        indexed: true
        description: >
          Coarse family such as resnet, convnext, vit, swin, bert,
          unet, gmlp, or custom.

      architecture_type:
        type: string
        required: false
        indexed: true
        allowed_values:
          - cnn
          - transformer
          - mixer
          - rnn
          - gnn
          - diffusion
          - multimodal
          - classical_ml
          - other

      task_type:
        type: string
        required: false
        indexed: true
        examples:
          - image_classification
          - object_detection
          - segmentation
          - language_modeling
          - text_classification
          - tabular_classification
          - regression

      input_modalities:
        type: string_list
        required: false
        description: >
          Input modalities used by the model, such as image, text, audio,
          video, tabular, graph, or multimodal.

      output_type:
        type: string
        required: false
        indexed: true
        examples:
          - logits
          - token_logits
          - embeddings
          - boxes
          - masks
          - scalar

      default_input_signature:
        type: string
        required: false
        indexed: true
        description: >
          Default or expected input shape/signature for this model. The exact
          run-specific workload signature still belongs in TrainingConfig.

      # ============================================================
      # Structural properties
      # ============================================================

      parameter_count:
        type: integer
        required: false
        indexed: true

      trainable_parameter_count:
        type: integer
        required: false
        indexed: true

      model_size_mb:
        type: float
        required: false

      layer_count:
        type: integer
        required: false

      hidden_size:
        type: integer
        required: false

      attention_head_count:
        type: integer
        required: false

      embedding_dim:
        type: integer
        required: false

      vocab_size:
        type: integer
        required: false

      num_classes:
        type: integer
        required: false

      max_sequence_length:
        type: integer
        required: false

      image_size:
        type: string
        required: false
        description: >
          Canonical image size string, for example 224x224 or 512x512.

      model_config_json:
        type: string
        required: false
        description: >
          JSON fallback for architecture details that are useful but not queried
          often enough to promote to first-class fields.

      tags:
        type: string_list
        required: false
        description: >
          Retrieval tags such as vision, transformer, efficientnet, lightweight,
          memory_intensive, or custom.

      confidence:
        type: float
        required: false
        indexed: true
        description: >
          Confidence from 0.0 to 1.0 in this model property record.

      created_at:
        type: datetime
        required: false
        indexed: true

      updated_at:
        type: datetime
        required: false
        indexed: true

    recommended_constraints:
      - type: uniqueness
        property: model_key

    recommended_indexes:
      - model_name
      - framework
      - framework_version
      - library_name
      - library_version
      - source_name
      - model_version
      - pretrained
      - checkpoint_key
      - model_family
      - architecture_type
      - task_type
      - output_type
      - default_input_signature
      - parameter_count
      - trainable_parameter_count
      - confidence
      - created_at
      - updated_at

  Technology:
    label: Technology
    category: evidence_dimension
    key: technology_key

    description: >
      Stable ontology entry for a runtime feature, precision mode, backend,
      packing strategy, or code optimization used by job evidence. Store only
      compact identity and classification in the graph; detailed API docs,
      examples, and coding guidance belong in the vector database.

    properties:
      technology_key:
        type: string
        required: true
        unique: true
        description: >
          Canonical key shared with vector metadata, such as pytorch_amp,
          bf16_autocast, tf32_matmul, torch_compile, cuda_graphs, nvidia_mps,
          cuda_streams, or power_of_two_batch_optimizer.

      name:
        type: string
        required: false
        indexed: true

      category:
        type: string
        required: false
        indexed: true
        examples:
          - precision_optimization
          - tensor_core_enablement
          - compiler_optimization
          - launch_overhead_reduction
          - packing
          - batch_size_search

      api_symbols:
        type: string_list
        required: false
        description: >
          API symbols linked to this technology for vector retrieval filters.

      related_feature_keys:
        type: string_list
        required: false
        description: >
          Hardware feature keys linked to this technology for vector retrieval
          filters.

    recommended_constraints:
      - type: uniqueness
        property: technology_key

    recommended_indexes:
      - name
      - category

  TrainingConfig:
    label: TrainingConfig
    category: evidence_dimension
    key: config_key

    description: >
      Immutable training/workload configuration snapshot. This node captures
      the hyperparameters and input signature that make a result reusable.
      SingleJob points to one TrainingConfig directly. PackedJobMember points
      to its own TrainingConfig so different packed members can use different
      batch sizes, optimizers, precision modes, or other parameters.

    properties:
      config_key:
        type: string
        required: true
        unique: true
        description: >
          Canonical hash/string for this configuration.

      input_signature:
        type: string
        required: false
        indexed: true
        description: >
          Compact workload signature, for example image=224x224,
          seq_len=2048, or tokens=4096.

      batch_size:
        type: integer
        required: false
        indexed: true

      effective_batch_size:
        type: integer
        required: false
        description: >
          Effective batch size after gradient accumulation and parallelism.

      gradient_accumulation_steps:
        type: integer
        required: false

      epochs:
        type: integer
        required: false

      max_steps:
        type: integer
        required: false

      steps_per_epoch:
        type: integer
        required: false

      total_steps:
        type: integer
        required: false

      precision:
        type: string
        required: false
        indexed: true
        allowed_values:
          - fp32
          - fp16
          - bf16
          - int8
          - mixed

      optimizer:
        type: string
        required: false
        indexed: true
        examples:
          - adam
          - adamw
          - sgd

      learning_rate:
        type: float
        required: false
        indexed: true

      weight_decay:
        type: float
        required: false

      lr_scheduler:
        type: string
        required: false

      loss_function:
        type: string
        required: false

      hyperparams_json:
        type: string
        required: false
        description: >
          JSON fallback for less frequently queried hyperparameters. Frequently
          searched values should be promoted to first-class fields.

      created_at:
        type: datetime
        required: false
        indexed: true

    recommended_constraints:
      - type: uniqueness
        property: config_key

    recommended_indexes:
      - input_signature
      - batch_size
      - precision
      - optimizer
      - learning_rate
      - created_at

  SingleJob:
    label: SingleJob
    additional_labels:
      - Job
    extends: Job
    category: evidence
    key: job_id

    description: >
      Result record for one model/workload running alone. A SingleJob can be a
      full training result or a probe result. Probe records are valid evidence
      for resource use, safe batch size, and rough runtime planning, but epoch
      and total-training times should be stored as estimates unless a full
      epoch or full training run was actually observed.

    properties:
      model_key:
        type: string
        required: true
        indexed: true
        description: >
          Denormalized model key for fast lookup. Source of truth should be the
          TRAINS_MODEL relationship.

      config_key:
        type: string
        required: true
        indexed: true
        description: >
          Denormalized TrainingConfig key for fast lookup. Source of truth
          should be the USES_CONFIG relationship.

      seed:
        type: integer
        required: false
        description: >
          Random seed used for this observed result. Seed is result metadata,
          not part of the reusable TrainingConfig identity unless explicitly
          encoded in config_key by the loader.

      observed_epochs:
        type: float
        required: false
        description: >
          Number of epochs actually observed. Partial probes may be less than
          1.0.

      observed_steps:
        type: integer
        required: false
        indexed: true
        description: >
          Number of training/probe steps actually observed.

      observed_samples:
        type: integer
        required: false
        description: >
          Number of samples actually processed during the measured run.

      completed_full_epoch:
        type: boolean
        required: false
        indexed: true
        description: >
          True only when the observation includes at least one complete epoch.

      completed_full_training:
        type: boolean
        required: false
        indexed: true
        description: >
          True only when the whole intended training run completed.

      # ============================================================
      # Batch-size probing / reuse result
      # ============================================================

      resolved_batch_size:
        type: integer
        required: false
        indexed: true
        description: >
          Final safe batch size selected by this result or probe.

      max_safe_batch_size:
        type: integer
        required: false
        indexed: true
        description: >
          Largest observed batch size that completed successfully under this
          model/hardware/technology-tags/config/memory-cap setting.

      oom_batch_size:
        type: integer
        required: false
        description: >
          Smallest observed batch size that caused OOM, if known.

      batch_search_method:
        type: string
        required: false
        indexed: true
        allowed_values:
          - none
          - power_of_two
          - binary_search
          - linear_search
          - manual
          - fixed
          - other
        description: >
          Method used to find the safe batch size.

      # ============================================================
      # Training/objective outcome
      # ============================================================

      final_train_loss:
        type: float
        required: false

      final_validation_loss:
        type: float
        required: false

      primary_metric_name:
        type: string
        required: false
        indexed: true
        description: >
          Name of the main task metric, for example accuracy, f1, auc, loss,
          perplexity, or reward.

      primary_metric_value:
        type: float
        required: false
        indexed: true

      primary_metric_direction:
        type: string
        required: false
        allowed_values:
          - maximize
          - minimize

      # ============================================================
      # Runtime estimates derived from partial probes
      # ============================================================

      estimated_epoch_seconds:
        type: float
        required: false
        indexed: true
        description: >
          Estimated full epoch duration. Do not populate as an observed fact
          unless completed_full_epoch is true.

      estimated_total_training_seconds:
        type: float
        required: false
        indexed: true

      estimation_method:
        type: string
        required: false
        allowed_values:
          - none
          - step_time_extrapolation
          - partial_epoch_extrapolation
          - historical_profile
          - scheduler_model
          - manual
          - other

      estimate_confidence:
        type: float
        required: false
        indexed: true
        description: >
          Confidence from 0.0 to 1.0 for estimated_epoch_seconds and
          estimated_total_training_seconds.

    recommended_indexes:
      - model_key
      - config_key
      - observed_steps
      - completed_full_epoch
      - completed_full_training
      - resolved_batch_size
      - max_safe_batch_size
      - batch_search_method
      - primary_metric_name
      - primary_metric_value
      - estimated_epoch_seconds
      - estimated_total_training_seconds
      - estimate_confidence

  PackedJob:
    label: PackedJob
    additional_labels:
      - Job
    extends: Job
    category: evidence
    key: job_id

    description: >
      Result record for a concurrent multi-model execution group. PackedJob
      stores group-level packing behavior: compatibility, aggregate memory,
      aggregate throughput, slowdown, backend, and packing strategy. Per-model
      hyperparameters and per-model outcomes must be stored on
      PackedJobMember nodes.

    properties:
      packing_group_key:
        type: string
        required: true
        indexed: true
        description: >
          Canonical key for the packed member model/config combination,
          independent of one specific execution id. This key should distinguish
          the same model set with different per-member hyperparameters.

      packing_strategy:
        type: string
        required: true
        indexed: true
        allowed_values:
          - mps
          - cuda_streams
          - multiprocessing
          - cuda_process
          - scheduler_packing
          - other
        description: >
          Strategy used to run multiple models concurrently.

      compatible:
        type: boolean
        required: true
        indexed: true
        description: >
          Whether this packed combination completed well enough to be reused as
          compatible scheduling evidence.

      slowdown_ratio:
        type: float
        required: false
        indexed: true
        description: >
          Group-level slowdown compared with relevant SingleJob baselines.
          1.0 means no slowdown.

      throughput_efficiency:
        type: float
        required: false
        indexed: true
        description: >
          Packed throughput divided by expected throughput from solo baselines,
          when solo baselines are available.

    recommended_indexes:
      - packing_group_key
      - packing_strategy
      - compatible
      - slowdown_ratio
      - throughput_efficiency

  PackedJobMember:
    label: PackedJobMember
    category: evidence
    key: member_id

    description: >
      Per-model result inside a PackedJob. This node exists because each member
      of a packed job can use a different model, input signature, batch size,
      optimizer, learning rate, precision mode, and runtime behavior.

    properties:
      member_id:
        type: string
        required: true
        unique: true
        description: >
          Unique identifier for this packed member result.

      model_key:
        type: string
        required: true
        indexed: true
        description: >
          Denormalized model key. Source of truth should be the TRAINS_MODEL
          relationship.

      config_key:
        type: string
        required: true
        indexed: true
        description: >
          Denormalized TrainingConfig key. Source of truth should be the
          USES_CONFIG relationship.

      status:
        type: string
        required: true
        indexed: true
        allowed_values:
          - succeeded
          - failed
          - partial
          - timeout
          - oom
          - killed
        description: >
          Member-level result status. This can differ from the group status.

      seed:
        type: integer
        required: false
        description: >
          Random seed used for this packed member result.

      observed_epochs:
        type: float
        required: false
        description: >
          Number of epochs actually observed for this member.

      observed_steps:
        type: integer
        required: false
        indexed: true

      observed_samples:
        type: integer
        required: false

      completed_full_epoch:
        type: boolean
        required: false
        indexed: true

      completed_full_training:
        type: boolean
        required: false
        indexed: true

      # ============================================================
      # Member batch-size probing / reuse result
      # ============================================================

      resolved_batch_size:
        type: integer
        required: false
        indexed: true

      max_safe_batch_size:
        type: integer
        required: false
        indexed: true

      oom_batch_size:
        type: integer
        required: false

      batch_search_method:
        type: string
        required: false
        allowed_values:
          - none
          - power_of_two
          - binary_search
          - linear_search
          - manual
          - fixed
          - other

      # ============================================================
      # Member observed resource measurements
      # ============================================================

      avg_vram_mb:
        type: integer
        required: false

      peak_vram_mb:
        type: integer
        required: false
        indexed: true
        description: >
          Member-attributed peak VRAM when attribution is available. Packed
          group peak remains on PackedJob.

      avg_sm_utilization_pct:
        type: float
        required: false

      avg_gpu_utilization_pct:
        type: float
        required: false

      observed_avg_step_time_ms:
        type: float
        required: false
        indexed: true

      observed_throughput_samples_per_sec:
        type: float
        required: false

      observed_throughput_tokens_per_sec:
        type: float
        required: false

      slowdown_vs_single:
        type: float
        required: false
        indexed: true
        description: >
          Member-level slowdown compared with a matching SingleJob baseline.

      # ============================================================
      # Member training/objective outcome
      # ============================================================

      final_train_loss:
        type: float
        required: false

      final_validation_loss:
        type: float
        required: false

      primary_metric_name:
        type: string
        required: false
        indexed: true

      primary_metric_value:
        type: float
        required: false
        indexed: true

      primary_metric_direction:
        type: string
        required: false
        allowed_values:
          - maximize
          - minimize

      metrics_json:
        type: string
        required: false

      error_message:
        type: string
        required: false

      notes:
        type: string
        required: false

    recommended_constraints:
      - type: uniqueness
        property: member_id

    recommended_indexes:
      - model_key
      - config_key
      - status
      - observed_steps
      - completed_full_epoch
      - completed_full_training
      - resolved_batch_size
      - max_safe_batch_size
      - peak_vram_mb
      - observed_avg_step_time_ms
      - slowdown_vs_single
      - primary_metric_name
      - primary_metric_value

relationship_types:
  SINGLE_TRAINS_MODEL:
    from: SingleJob
    to: Model
    cardinality: many_to_one
    description: SingleJob records evidence for one model running alone.

  SINGLE_USES_CONFIG:
    from: SingleJob
    to: TrainingConfig
    cardinality: many_to_one
    description: SingleJob used one immutable training/workload config.

  JOB_USED_HARDWARE:
    from: Job
    to: Hardware
    cardinality: many_to_many
    description: >
      Job result used this hardware or hardware environment. The relationship
      records the actual resource slice visible to the job. This is especially
      important in cluster scenarios where the physical CPU may have many
      threads, but the job only receives a requested/allocated subset.
    relationship_properties:
      resource_role:
        type: string
        required: false
        allowed_values:
          - primary_accelerator
          - secondary_accelerator
          - host_cpu
          - host_memory
          - storage
          - network
          - other
      allocation_scope:
        type: string
        required: false
        allowed_values:
          - whole_device
          - shared_device
          - cpu_threads
          - gpu_slice
          - mig_instance
          - container
          - process
          - scheduler_allocation
          - other
      requested_cpu_threads:
        type: integer
        required: false
        description: >
          CPU thread count requested by the job or scheduler.
      allocated_cpu_threads:
        type: integer
        required: false
        description: >
          CPU thread count actually allocated to the job.
      visible_cpu_threads:
        type: integer
        required: false
        description: >
          CPU thread count visible inside the process/container.
      cpu_affinity_json:
        type: string
        required: false
        description: >
          JSON list or range expression for CPU affinity, if known.
      numa_node_ids_json:
        type: string
        required: false
        description: >
          JSON list of NUMA node ids visible or allocated to the job.
      requested_gpu_count:
        type: integer
        required: false
      allocated_gpu_count:
        type: integer
        required: false
      visible_device_ids_json:
        type: string
        required: false
        description: >
          JSON list of accelerator ids visible to the job, such as
          CUDA_VISIBLE_DEVICES values.
      gpu_device_index:
        type: integer
        required: false
      gpu_uuid:
        type: string
        required: false
      mig_profile:
        type: string
        required: false
      mig_instance_id:
        type: string
        required: false
      requested_ram_mb:
        type: integer
        required: false
      allocated_ram_mb:
        type: integer
        required: false
      memory_cap_mb:
        type: integer
        required: false
        description: >
          Effective memory cap applied to this job for this hardware edge.
      memory_cap_source:
        type: string
        required: false
        allowed_values:
          - none
          - scheduler_policy
          - user_config
          - cuda_memory_fraction
          - mps_limit
          - container_limit
          - system_reserved
          - other
      effective_available_vram_mb:
        type: integer
        required: false
        description: >
          VRAM available to this job after reservations, caps, or slicing.
      exclusive:
        type: boolean
        required: false
        description: >
          True if the job had exclusive access to this resource.
      notes:
        type: string
        required: false

  JOB_USES_TECHNOLOGY:
    from: Job
    to: Technology
    cardinality: many_to_many
    description: Job result used this runtime, precision, packing, or optimization technology.
    relationship_properties:
      role:
        type: string
        required: false
        allowed_values:
          - runtime
          - precision
          - optimization
          - packing
          - probe
          - other

  HAS_PACKED_MEMBER:
    from: PackedJob
    to: PackedJobMember
    cardinality: one_to_many
    description: PackedJob contains one member result per concurrently trained model.
    relationship_properties:
      position:
        type: integer
        required: false
      role:
        type: string
        required: false

  MEMBER_TRAINS_MODEL:
    from: PackedJobMember
    to: Model
    cardinality: many_to_one
    description: PackedJobMember records evidence for one model within a packed group.

  MEMBER_USES_CONFIG:
    from: PackedJobMember
    to: TrainingConfig
    cardinality: many_to_one
    description: >
      PackedJobMember used one immutable training/workload config. Different
      members of the same PackedJob may point to different TrainingConfig nodes.

  MEMBER_USES_TECHNOLOGY:
    from: PackedJobMember
    to: Technology
    cardinality: many_to_many
    description: PackedJobMember used this runtime, precision, packing, or optimization technology.

  MEMBER_BASELINE_SINGLE_JOB:
    from: PackedJobMember
    to: SingleJob
    cardinality: many_to_one
    description: >
      Optional baseline SingleJob used to compute slowdown_vs_single or
      throughput_efficiency for this packed member.
