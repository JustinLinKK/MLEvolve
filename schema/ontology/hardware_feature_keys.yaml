# Canonical hardware-feature key vocabulary.
# Tags here MUST match those used in Schema A features lists.

version: 2
keys:
  tensor_cores:
    description: NVIDIA Tensor Core acceleration unit.
  tensor_cores_3gen:
    description: 3rd-gen tensor cores (Ampere).
  tensor_cores_4gen:
    description: 4th-gen tensor cores (Hopper / Ada).
  tensor_cores_5gen:
    description: 5th-gen tensor cores (Blackwell).
  amp:
    description: Mixed-precision automatic kernel selection.
  bf16:
    description: Native BF16 (Brain Float 16) support.
  fp16:
    description: Native FP16 support.
  fp32:
    description: Native FP32 support.
  fp64:
    description: Native FP64 support.
  tf32:
    description: TensorFloat-32 acceleration for FP32 matmul.
  int8:
    description: INT8 quantized inference path.
  fp8:
    description: Generic FP8 (Hopper/Blackwell).
  fp8_e4m3:
    description: FP8 E4M3 format (forward activations).
  fp8_e5m2:
    description: FP8 E5M2 format (gradients).
  fp4:
    description: FP4 quantization (Blackwell).
  sm_80:
    description: sm_80 compute capability (Ampere DC).
  sm_86:
    description: sm_86 compute capability (Ampere consumer).
  sm_89:
    description: sm_89 compute capability (Ada Lovelace).
  sm_90:
    description: sm_90 compute capability (Hopper).
  sm_100:
    description: sm_100 compute capability (Blackwell DC).
  sm_120:
    description: sm_120 compute capability (Blackwell GeForce).
  cuda_graphs:
    description: CUDA graph capture/replay support.
  pcie5_x16:
    description: PCIe 5.0 x16 host interconnect.
  mig:
    description: Multi-Instance GPU partitioning.
  nvlink:
    description: NVLink high-bandwidth peer interconnect.
  mps:
    description: NVIDIA Multi-Process Service.
