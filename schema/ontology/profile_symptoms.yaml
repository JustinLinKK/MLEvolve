version: 1
keys:
  low_sm_utilization:
    optimization_targets: [improve_sm_utilization, improve_throughput]
  high_vram_pressure:
    optimization_targets: [reduce_vram, avoid_oom]
  oom:
    optimization_targets: [reduce_vram, avoid_oom]
  timeout:
    optimization_targets: [reduce_step_time, improve_throughput]
  launch_overhead_bound:
    optimization_targets: [reduce_kernel_launch_overhead]
  memory_bandwidth_bound:
    optimization_targets: [improve_memory_efficiency]
  dataloader_bottleneck:
    optimization_targets: [improve_dataloader]
  precision_not_optimized:
    optimization_targets: [improve_precision_efficiency, enable_tensor_core]
  tensor_core_not_used:
    optimization_targets: [enable_tensor_core, improve_throughput]
  slow_packed_training:
    optimization_targets: [improve_packing]
