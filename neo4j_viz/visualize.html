<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>localml_scheduler — Neo4j → Cytoscape.js</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cose-base@2.2.0/cose-base.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
<style>
    body { font-family: sans-serif; margin: 0; background: #1a1a1a; color: #e0e0e0; }
    #header { padding: 6px 12px; background: #2a2a2a; border-bottom: 1px solid #444; font-size: 12px; }
    #cy { width: 100vw; height: calc(100vh - 250px); }
    #panel { padding: 6px 12px; background: #2a2a2a; border-top: 1px solid #444;
             height: 180px; overflow: auto; font-family: monospace; font-size: 10px; }
    #panel pre { margin: 0; white-space: pre-wrap; }
    .legend-item { display: inline-block; margin: 2px 4px; font-size: 11px; cursor: pointer; user-select: none; }
    .legend-item.off { opacity: 0.35; text-decoration: line-through; }
    .swatch { display: inline-block; width: 11px; height: 11px; vertical-align: middle;
              margin-right: 3px; border: 1px solid #fff; border-radius: 2px; }
    button { background:#3a3a3a; color:#e0e0e0; border:1px solid #555; padding:2px 8px; cursor:pointer; }
    button:hover { background:#4a4a4a; }
    input { background:#1a1a1a; color:#e0e0e0; border:1px solid #555; padding:2px 6px; }
</style>
</head>
<body>
<div id="header">
    <strong>localml_scheduler results graph</strong>
    <span id="counts" style="margin-left:8px;color:#aaa"></span>
    <br>
    <span style="margin-right:8px"><strong>Toggle types:</strong></span>
    <span id="legend"></span>
    <br>
    <span><strong>Layout:</strong></span>
    <button onclick="setLayout('dagre',{rankDir:'LR',nodeSep:25,rankSep:120})">dagre LR</button>
    <button onclick="setLayout('dagre',{rankDir:'TB',nodeSep:25,rankSep:120})">dagre TB</button>
    <button onclick="setLayout('fcose',{quality:'default',randomize:false,nodeRepulsion:8000})">fcose</button>
    <button onclick="setLayout('concentric',{minNodeSpacing:20})">concentric</button>
    <button onclick="setLayout('breadthfirst',{directed:true,spacingFactor:1.2})">bfs</button>
    &nbsp;
    <input id="filter" type="text" placeholder="label/model_name/backend contains..." style="width:240px">
    <button onclick="applyFilter()">apply filter</button>
    <button onclick="resetFilter()">reset</button>
    <button onclick="cy.fit(undefined,40)">fit</button>
</div>
<div id="cy"></div>
<div id="panel">
    <h3 style="margin:0 0 4px 0;font-size:12px">Click a node to inspect its full property set</h3>
    <pre id="detail">(no selection)</pre>
</div>

<script>
// 12 node types, each own color
const TYPE_COLORS = {
    Sweep:             "#e8c547",   // yellow
    Workflow:          "#ffa54f",   // orange
    Config:            "#5dadec",   // light blue
    Job:               "#7fbf7f",   // green
    Model:             "#c084fc",   // violet
    WorkloadSignature: "#f472b6",   // pink
    Backend:           "#22d3ee",   // cyan
    Hardware:          "#fb7185",   // red
    Accelerator:       "#fcd34d",   // amber
    Toolkit:           "#a3e635",   // lime
    BatchShape:        "#94a3b8",   // slate
    RunProfile:        "#e5e7eb",   // gray-100
};

const TYPE_SIZES = {
    Sweep: 70, Workflow: 60, Config: 40, Job: 14, Model: 50,
    WorkloadSignature: 30, Backend: 50, Hardware: 60, Accelerator: 50,
    Toolkit: 40, BatchShape: 40, RunProfile: 10,
};

let cy;
const disabledTypes = new Set();

function buildLegend(counts) {
    const el = document.getElementById("legend");
    el.innerHTML = Object.keys(TYPE_COLORS).map(t =>
        `<span class="legend-item" data-type="${t}" onclick="toggleType('${t}')">
             <span class="swatch" style="background:${TYPE_COLORS[t]}"></span>${t} (${counts[t]||0})
         </span>`).join("");
}

function toggleType(t) {
    if (disabledTypes.has(t)) { disabledTypes.delete(t); }
    else { disabledTypes.add(t); }
    document.querySelector(`.legend-item[data-type="${t}"]`).classList.toggle("off");
    cy.nodes(`[type="${t}"]`).style("display", disabledTypes.has(t) ? "none" : "element");
    cy.edges().forEach(e => {
        const sV = e.source().visible(), tV = e.target().visible();
        e.style("display", (sV && tV) ? "element" : "none");
    });
}

function setLayout(name, opts) {
    try {
        cy.layout(Object.assign({name, animate:false}, opts||{})).run();
        setTimeout(() => cy.fit(undefined, 40), 50);
    } catch (e) {
        alert(`Layout "${name}" failed: ${e.message}\nUsing random.`);
        cy.layout({name:"random", animate:false}).run();
        cy.fit(undefined, 40);
    }
}

function applyFilter() {
    const q = document.getElementById("filter").value.trim().toLowerCase();
    if (!q) { resetFilter(); return; }
    cy.elements().addClass("dim");
    cy.nodes().forEach(n => {
        const d = n.data();
        const blob = JSON.stringify(d).toLowerCase();
        if (blob.includes(q)) {
            n.removeClass("dim");
            n.connectedEdges().removeClass("dim");
            n.neighborhood("node").removeClass("dim");
        }
    });
}
function resetFilter() { cy.elements().removeClass("dim"); }

fetch("graph.json").then(r => r.json()).then(data => {
    const counts = data.nodes.reduce((m, n) => {
        m[n.data.type] = (m[n.data.type] || 0) + 1; return m;
    }, {});
    document.getElementById("counts").textContent =
        `${data.nodes.length} nodes, ${data.edges.length} edges`;
    buildLegend(counts);

    const styleArr = [];
    for (const [t, color] of Object.entries(TYPE_COLORS)) {
        styleArr.push({
            selector: `node[type='${t}']`,
            style: {
                "background-color": color, "label": "data(label)",
                "width": TYPE_SIZES[t], "height": TYPE_SIZES[t],
                "font-size": t === "Job" || t === "RunProfile" ? 6 : 11,
                "color": "#000",
                "text-valign": "center", "text-halign": "center",
                "text-wrap": "wrap", "text-max-width": "60px",
            }
        });
    }
    styleArr.push(
        { selector: "node[type='Config']", style: {
            "width": "mapData(wall_clock_s, 0, 1500, 25, 70)",
            "height": "mapData(wall_clock_s, 0, 1500, 25, 70)"
        }},
        { selector: "node[type='Job'][status='FAILED']", style: {
            "background-color": "#e0735c"
        }},
        { selector: "node[type='Job'][model_class='CNN']", style: {
            "border-color": "#000", "border-width": 1
        }},
        { selector: "node[type='Job'][model_class='Transformer']", style: {
            "border-color": "#fff", "border-width": 2
        }},
        { selector: "node[type='Job'][model_class='Mixer']", style: {
            "border-color": "#888", "border-width": 2, "border-style": "dashed"
        }},
        { selector: "edge", style: {
            "line-color": "#666", "width": 1, "opacity": 0.4,
            "target-arrow-shape": "triangle", "target-arrow-color": "#666",
            "curve-style": "bezier", "arrow-scale": 0.8
        }},
        { selector: "edge[type='HAS_CONFIG']", style: { "line-color": "#999", "width": 2, "opacity": 0.7 }},
        { selector: "edge[type='HAS_JOB']", style: { "line-color": "#7fbf7f", "opacity": 0.3 }},
        { selector: "edge[type='RAN_JOB']", style: { "line-color": "#5dadec", "opacity": 0.3 }},
        { selector: "edge[type='USES_MODEL']", style: { "line-color": "#c084fc", "opacity": 0.5 }},
        { selector: "edge[type='ON_HARDWARE']", style: { "line-color": "#fb7185", "opacity": 0.4 }},
        { selector: "edge[type='USED_BACKEND']", style: { "line-color": "#22d3ee", "opacity": 0.4 }},
        { selector: "node:selected", style: {
            "border-color": "#ff5050", "border-width": 4
        }},
        { selector: ".dim", style: { "opacity": 0.08 }},
    );

    cy = window.cy = cytoscape({
        container: document.getElementById("cy"),
        elements: data, style: styleArr,
        // Use dagre (reliable, plugin always loaded) as default. User can switch later.
        layout: { name: "dagre", rankDir: "LR", nodeSep: 15, rankSep: 100, animate: false }
    });

    // Run layout, then fit. If layout fails (plugin not loaded), random spread + fit.
    setTimeout(() => {
        try {
            cy.layout({ name: "dagre", rankDir: "LR", nodeSep: 15, rankSep: 100, animate: false }).run();
        } catch (e) {
            console.warn("dagre failed, using random:", e);
            cy.layout({ name: "random", animate: false }).run();
        }
        cy.fit(undefined, 40);
    }, 100);

    cy.on("tap", "node", evt => {
        document.getElementById("detail").textContent = JSON.stringify(evt.target.data(), null, 2);
    });
});
</script>
</body>
</html>
