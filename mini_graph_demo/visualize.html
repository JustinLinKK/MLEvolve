<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>mini_graph_demo — Graph DB architecture</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
<style>
  body { font-family: sans-serif; margin: 0; background: #1a1a1a; color: #e0e0e0; }
  #header { padding: 8px 14px; background: #2a2a2a; border-bottom: 1px solid #444; font-size: 12px; }
  #cy { width: 100vw; height: calc(100vh - 260px); }
  #panel { padding: 6px 12px; background: #2a2a2a; border-top: 1px solid #444;
           height: 190px; overflow: auto; font-family: monospace; font-size: 11px; }
  .legend { display: inline-block; margin: 2px 6px; font-size: 11px; }
  .swatch { display: inline-block; width: 11px; height: 11px; vertical-align: middle;
            margin-right: 4px; border: 1px solid #fff; border-radius: 2px; }
  button { background:#3a3a3a; color:#e0e0e0; border:1px solid #555;
           padding:3px 9px; cursor:pointer; }
  button:hover { background:#4a4a4a; }
</style>
</head>
<body>
<div id="header">
  <strong>mini_graph_demo — graph DB architecture</strong>
  <span id="counts" style="margin-left:8px;color:#aaa"></span>
  <br>
  <strong>Node types:</strong>
  <span id="legend"></span>
  <br>
  <strong>Layout:</strong>
  <button onclick="setLayout('dagre',{rankDir:'LR'})">dagre LR</button>
  <button onclick="setLayout('dagre',{rankDir:'TB'})">dagre TB</button>
  <button onclick="setLayout('breadthfirst',{directed:true,spacingFactor:1.3})">bfs</button>
  <button onclick="setLayout('concentric',{minNodeSpacing:25})">concentric</button>
  <button onclick="cy.fit(undefined,40)">fit</button>
</div>
<div id="cy"></div>
<div id="panel">
  <h3 style="margin:0 0 4px 0;font-size:12px">Click any node to inspect its properties</h3>
  <pre id="detail">(no selection)</pre>
</div>
<script>
const TYPE_COLORS = {
  Hardware:        "#fb7185",
  Model:           "#c084fc",
  Technology:      "#22d3ee",
  TrainingConfig:  "#5dadec",
  SingleJob:       "#7fbf7f",
  PackedJob:       "#facc15",
  PackedJobMember: "#fcd34d",
};
const TYPE_SIZES = {
  Hardware: 60, Model: 55, Technology: 35, TrainingConfig: 40,
  SingleJob: 50, PackedJob: 60, PackedJobMember: 35,
};
let cy;

function setLayout(name, opts) {
  cy.layout(Object.assign({name, animate:false}, opts||{})).run();
  setTimeout(() => cy.fit(undefined, 40), 50);
}

fetch("graph.json").then(r => r.json()).then(data => {
  const counts = data.nodes.reduce((m, n) => {
    m[n.data.type] = (m[n.data.type] || 0) + 1; return m;
  }, {});
  document.getElementById("counts").textContent =
    `${data.nodes.length} nodes, ${data.edges.length} edges`;
  document.getElementById("legend").innerHTML =
    Object.keys(TYPE_COLORS).map(t =>
      `<span class="legend"><span class="swatch" style="background:${TYPE_COLORS[t]}"></span>${t} (${counts[t]||0})</span>`
    ).join("");

  const styles = [];
  for (const [t, color] of Object.entries(TYPE_COLORS)) {
    styles.push({
      selector: `node[type='${t}']`,
      style: {
        "background-color": color, "label": "data(label)",
        "width": TYPE_SIZES[t], "height": TYPE_SIZES[t],
        "font-size": 11, "color": "#000",
        "text-valign": "center", "text-halign": "center",
        "text-wrap": "wrap", "text-max-width": "70px",
      }
    });
  }
  styles.push(
    { selector: "edge", style: {
        "line-color": "#888", "width": 1.2, "opacity": 0.55,
        "target-arrow-shape": "triangle", "target-arrow-color": "#888",
        "curve-style": "bezier", "arrow-scale": 0.9,
        "label": "data(type)", "font-size": 7, "color": "#bbb",
        "text-rotation": "autorotate", "text-margin-y": -5,
    }},
    { selector: "edge[type='HAS_PACKED_MEMBER']", style: { "line-color": "#facc15" }},
    { selector: "edge[type='JOB_USED_HARDWARE']", style: { "line-color": "#fb7185" }},
    { selector: "edge[type='MEMBER_BASELINE_SINGLE_JOB']", style: { "line-style": "dashed" }},
    { selector: "node:selected", style: { "border-color": "#ff5050", "border-width": 4 }},
  );

  cy = window.cy = cytoscape({
    container: document.getElementById("cy"),
    elements: data, style: styles,
    layout: { name: "dagre", rankDir: "LR", nodeSep: 30, rankSep: 130, animate: false }
  });
  cy.on("tap", "node", e => {
    document.getElementById("detail").textContent =
      JSON.stringify(e.target.data(), null, 2);
  });
  setTimeout(() => cy.fit(undefined, 40), 100);
});
</script>
</body>
</html>
